<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Admin Orders</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f3f4f6;margin:0;padding:0;color:#1f2937}
.c{max-width:1440px;margin:0 auto;padding:16px}

/* Header */
.hd{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:20px}
h1{color:#2d4a22;margin:0;font-size:1.4rem;display:flex;align-items:center;gap:8px}
h1 span.sub{font-size:.55em;opacity:.4;font-weight:400}
.btn-s{background:#2d4a22;color:#fff;padding:8px 16px;border-radius:6px;text-decoration:none;font-weight:600;font-size:14px;display:inline-flex;align-items:center;gap:6px}

/* Toolbar */
.tb{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;background:#fff;padding:12px;border-radius:8px;box-shadow:0 1px 2px rgba(0,0,0,.05)}
.b{padding:8px 16px;border-radius:6px;border:none;font-weight:600;cursor:pointer;font-size:14px}
.bd{background:#fee2e2;color:#991b1b;border:1px solid #fecaca}
.bs{background:#f3f4f6;color:#374151;border:1px solid #d1d5db}
#sc{color:#6b7280;font-size:14px}

/* Currency toggle */
.cur-toggle{display:flex;background:#e5e7eb;border-radius:8px;padding:3px;overflow:hidden}
.cur-btn{padding:7px 20px;border:none;font-weight:700;font-size:13px;cursor:pointer;background:transparent;color:#6b7280;transition:all .2s;border-radius:6px}
.cur-btn.active{background:#2d6a2e;color:#fff;box-shadow:0 2px 6px rgba(45,106,46,.3)}

/* Rate bar */
.rc-bar{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;background:#fff;padding:10px 14px;border-radius:8px;box-shadow:0 1px 2px rgba(0,0,0,.05);border:1px solid #e5e7eb}
.rc-label{font-size:12px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.5px}
.rc-rate{font-size:15px;font-weight:800;color:#2d4a22}
.rc-time{font-size:11px;color:#9ca3af;font-weight:500;margin-left:auto}
.rc-btn{padding:5px 14px;border-radius:5px;border:none;font-weight:600;font-size:12px;cursor:pointer;transition:.2s}
.rc-fetch{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
.rc-fetch:hover{background:#dbeafe}
.rc-fetching{background:#f3f4f6;color:#9ca3af;cursor:wait}
.rc-err{font-size:11px;color:#dc2626;font-weight:500}
.rc-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;flex-shrink:0}
.rc-dot.err{background:#ef4444}

/* Total bar */
.total-bar{max-width:1440px;margin:0 auto 24px;background:#fff;border:1px solid #d1d5db;border-left:4px solid #2d4a22;border-radius:6px;padding:10px 20px;display:flex;justify-content:flex-end;align-items:center;gap:12px}
.total-lbl{color:#6b7280;font-weight:900;font-size:13px;text-transform:uppercase;letter-spacing:.5px}
.total-val{color:#1a5c1c;font-weight:900;font-size:18px;font-variant-numeric:tabular-nums}
.total-cur{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;vertical-align:middle;letter-spacing:.3px}
.total-cur.npr{background:#dbeafe;color:#1e40af}
.total-cur.usd{background:#fef3c7;color:#92400e}

/* Table wrapper */
.tw{background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 4px 6px rgba(0,0,0,.05);overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:1280px}
th,td{padding:0;border:1px solid #e5e7eb;vertical-align:top;text-align:left}
th{background:#2d4a22;color:#fff;font-weight:600;font-size:11px;text-transform:uppercase;padding:10px 8px;text-align:center;letter-spacing:.5px}
tr:hover{background:#f8faf8}
input[type=checkbox]{width:18px;height:18px;cursor:pointer;accent-color:#2d4a22}

/* ── Column: Checkbox + Date ── */
.col-check{width:44px;text-align:center;padding:12px 6px;background:#f9fafb}
.col-date{width:120px;padding:14px;background:#f9fafb;display:flex;flex-direction:column;align-items:center;gap:10px}
.dt{font-weight:700;color:#2d4a22;font-size:.9rem;white-space:nowrap}
.pt{width:44px;height:44px;object-fit:cover;border-radius:6px;border:1px solid #d1d5db;cursor:pointer;transition:.2s}
.pt:hover{opacity:.8;transform:scale(1.05)}
.no-img{width:44px;height:44px;background:#eee;display:flex;align-items:center;justify-content:center;border-radius:6px;font-size:9px;color:#aaa}

/* ── Column: Items ── */
.col-items{width:380px;padding:14px}
.items-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #e5e7eb}
.items-label{font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.5px}
.pid{font-size:.75rem;background:#e0e7ff;color:#3730a3;padding:2px 8px;border-radius:4px;font-weight:700;font-family:monospace}

/* Single item block */
.item-block{padding:8px 0;border-bottom:1px dashed #e5e7eb}
.item-block:last-of-type{border-bottom:none}
.item-top{display:flex;align-items:center;gap:10px}
.item-thumb{width:32px;height:32px;object-fit:cover;border-radius:4px;border:1px solid #e5e7eb;flex-shrink:0;cursor:pointer}
.item-thumb:hover{opacity:.8}
.item-name{font-weight:600;color:#1f2937;font-size:.88rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.item-meta{display:flex;align-items:center;gap:6px;margin:4px 0 0 42px;flex-wrap:wrap}
.item-size{font-size:.78rem;color:#374151;font-weight:600}
.fb{font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.3px;padding:1px 6px;border-radius:3px;white-space:nowrap;line-height:1.6}
.fb-powder{background:#dbeafe;color:#1e40af;border:1px solid #bfdbfe}
.fb-whole{background:#fef3c7;color:#92400e;border:1px solid #fcd34d}
.item-calc{display:flex;align-items:center;gap:6px;margin:3px 0 0 42px;font-size:.8rem;color:#4b5563;font-variant-numeric:tabular-nums}
.item-calc .eq{color:#9ca3af}
.item-calc .line-total{color:#1a5c1c;font-weight:800;font-size:.85rem;margin-left:auto}

/* Subtotal */
.subtotal-row{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:10px;border-top:2px solid #2d4a22}
.subtotal-label{color:#2d4a22;font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.3px}
.subtotal-val{color:#1a5c1c;font-weight:900;font-size:17px;font-variant-numeric:tabular-nums}
.subtotal-usd{font-size:11px;color:#9ca3af;font-weight:500;margin-left:6px}
.no-items{color:#9ca3af;font-size:.85rem;font-style:italic;padding:8px 0}

/* ── Column: Status ── */
.col-status{width:140px;padding:14px;display:flex;flex-direction:column;gap:8px;align-items:stretch}
.ss{padding:8px;border-radius:6px;border:1px solid #d1d5db;background:#fff;font-weight:600;cursor:pointer;width:100%;font-size:13px;text-align:center}
.s-Pending{background:#fff7ed;color:#c2410c;border-color:#fed7aa}
.s-Shipping{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe}
.s-Completed{background:#f0fdf4;color:#15803d;border-color:#bbf7d0}
.s-Success{background:#dcfce7;color:#15803d;border-color:#86efac}
.s-Rejected{background:#fef2f2;color:#b91c1c;border-color:#fecaca}
.badge{display:flex;align-items:center;justify-content:center;padding:5px 10px;border-radius:6px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.3px;animation:pi .4s ease-out forwards}
@keyframes pi{0%{transform:scale(.8);opacity:0}100%{transform:scale(1);opacity:1}}
.bq{background:#fffbeb;color:#92400e;border:1px solid #fde68a}
.bq::before{content:"⏳ "}
.bsn{background:#f0fdf4;color:#15803d;border:1px solid #86efac}
.bsn::before{content:"✅ "}
.bf{background:#fef2f2;color:#b91c1c;border:1px solid #fca5a5}
.bf::before{content:"❌ "}

/* ── Column: Client ── */
.col-client{padding:14px;flex:1;min-width:0}
.cl{font-size:.85rem;color:#374151;margin-bottom:5px;display:flex;gap:6px;line-height:1.4}
.cl strong{color:#111827;min-width:52px;flex-shrink:0;font-size:.78rem;text-transform:uppercase;letter-spacing:.3px;font-weight:700;opacity:.6}

/* ── Column: Payment ── */
.col-pay{width:94px;padding:14px;display:flex;flex-direction:column;gap:6px;align-items:center;justify-content:center}
.pay-tag{display:inline-flex;align-items:center;gap:3px;padding:4px 8px;border-radius:5px;font-size:.65rem;font-weight:800;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}
.pay-npr{background:#dbeafe;color:#1e40af;border:1px solid #bfdbfe}
.pay-usd{background:#fef3c7;color:#92400e;border:1px solid #fcd34d}
.pay-esewa{background:#dcfce7;color:#15803d;border:1px solid #bbf7d0}
.pay-khalti{background:#f3e8ff;color:#7c3aed;border:1px solid #ddd6fe}
.pay-na{background:#f3f4f6;color:#9ca3af;border:1px solid #e5e7eb}

/* ── Column: Actions ── */
.col-act{width:68px;padding:14px;display:flex;align-items:center;justify-content:center}
.dr{width:100%;display:flex;justify-content:center;align-items:center;background:#fee2e2;color:#991b1b;border:1px solid #fecaca;padding:8px;border-radius:6px;font-weight:600;cursor:pointer;font-size:11px;text-transform:uppercase;transition:.15s}
.dr:hover{background:#fecaca}

/* Toast */
#toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:#1f2937;color:#fff;padding:12px 24px;border-radius:50px;opacity:0;transition:.3s;z-index:2000;font-size:14px;width:90%;text-align:center;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Image modal */
#imgModal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);z-index:3000;display:none;align-items:center;justify-content:center;cursor:pointer}
#imgModal.show{display:flex}
#imgModal img{max-width:90%;max-height:90%;border-radius:8px;cursor:default}
.ci{position:absolute;top:20px;right:24px;color:#fff;cursor:pointer;font-size:36px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:rgba(255,255,255,.1)}
.ci:hover{background:rgba(255,255,255,.2)}

/* ═══════════════════════════════
   MOBILE
   ═══════════════════════════════ */
@media(max-width:840px){
  html,body{overflow-x:hidden;width:100%}
  ::-webkit-scrollbar{display:none}
  body{background:#e5e7eb}
  .c{padding:6px 0;max-width:100%}
  .tb{flex-direction:column;align-items:stretch;padding:10px 8px;gap:8px;border-radius:0}
  .b{width:calc(100% - 16px);margin:0 8px;justify-content:center;padding:12px}
  .cur-toggle{margin:0 8px;justify-content:center}
  #sc{text-align:center;margin:0 8px}
  .rc-bar{margin:0 8px 10px;flex-direction:column;align-items:stretch;gap:6px;padding:10px}
  .rc-time{margin-left:0;text-align:center}
  .total-bar{margin:0 8px 20px;padding:10px 14px;justify-content:space-between}
  .total-val{font-size:16px}

  .tw{box-shadow:none;border-radius:0}
  table{display:block;width:100%;min-width:0;border-spacing:0;border:none}
  thead{display:none}
  tbody{display:flex;flex-direction:column;gap:10px;padding:0 8px}

  /* Each row = a card */
  tr{display:flex;flex-direction:column;width:100%;background:#fff;border-radius:10px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid #e5e7eb;position:relative}
  td{display:flex;width:100%;padding:0;border:none;flex-direction:column;margin-bottom:0}

  /* Col 1: checkbox → absolute top-right */
  td:nth-child(1){order:1;position:absolute;top:14px;right:14px;width:auto;z-index:5;padding:0;background:transparent}
  td:nth-child(1) input{width:20px;height:20px}

  /* Col 2: date + screenshot → top bar */
  td:nth-child(2){order:2;flex-direction:row;align-items:center;justify-content:space-between;padding:0 0 10px 0;border-bottom:1px solid #f3f4f6;margin-bottom:10px;background:transparent}
  .dt{font-size:.85rem}
  .pt,.no-img{width:38px;height:38px;margin-top:0}

  /* Col 3: items */
  td:nth-child(3){order:3;background:transparent;margin-bottom:10px}
  .col-items{width:100%;padding:0}
  .items-header{margin-bottom:8px}
  .item-meta{margin-left:0}
  .item-calc{margin-left:0;flex-wrap:wrap}
  .item-calc .line-total{margin-left:0}

  /* Col 4: status */
  td:nth-child(4){order:4;background:transparent;margin-bottom:10px}
  .col-status{width:100%;padding:0;flex-direction:row;gap:8px;align-items:center}
  .ss{flex:1;font-size:14px;padding:10px}
  .badge{padding:6px 10px;font-size:10px}

  /* Col 5: client */
  td:nth-child(5){order:5;background:#f9fafb;border-radius:8px;padding:10px 12px;margin-bottom:10px}
  .col-client{padding:0;width:100%}
  .cl{font-size:.82rem;margin-bottom:3px}
  .cl strong{min-width:48px;font-size:.72rem}

  /* Col 6: payment */
  td:nth-child(6){order:6;background:transparent;margin-bottom:10px}
  .col-pay{width:100%;padding:0;flex-direction:row;justify-content:flex-start;gap:6px}
  .pay-tag{font-size:.72rem;padding:5px 10px}

  /* Col 7: delete */
  td:nth-child(7){order:7;background:transparent;margin-top:4px}
  .col-act{width:100%;padding:0}
  .dr{width:100%;padding:12px;font-size:13px}
}
</style></head><body>

<div class="c">
  <div class="hd">
    <h1>🌿 NaturaBotanica <span class="sub">Admin</span></h1>
    <a href="/api/manage-stock" class="btn-s">📦 Manage Stock</a>
  </div>

  <div class="tb">
    <button class="b bs" onclick="tSA()">☑️ Select All</button>
    <button class="b bd" id="bd" disabled onclick="dS()">🗑️ Delete</button>
    <span id="sc"></span>
    <div class="cur-toggle">
      <button class="cur-btn active" id="tbNPR" onclick="setCur('NPR')">🇳🇵 NPR</button>
      <button class="cur-btn" id="tbUSD" onclick="setCur('USD')">🇺🇸 USD</button>
    </div>
  </div>

  <div class="rc-bar">
    <span class="rc-dot" id="rateDot"></span>
    <span class="rc-label">Exchange Rate</span>
    <span style="font-size:13px;color:#374151">1 USD =</span>
    <span class="rc-rate" id="rateDisplay">...</span>
    <span style="font-size:13px;color:#374151;font-weight:600">NPR</span>
    <button class="rc-btn rc-fetch" id="rateFetchBtn" onclick="fetchRate()">🔄 Refresh</button>
    <span class="rc-err" id="rateErr"></span>
    <span class="rc-time" id="rateTime"></span>
  </div>

  <div class="tw">
    <table>
      <thead>
        <tr>
          <th style="width:44px">☐</th>
          <th style="width:120px">Date / Proof</th>
          <th style="width:380px">Order Items</th>
          <th style="width:140px">Status</th>
          <th>Client</th>
          <th style="width:94px">Payment</th>
          <th style="width:68px">Act</th>
        </tr>
      </thead>
      <tbody id="tb">{{ORDERS_ROWS}}</tbody>
    </table>
  </div>

  <div class="total-bar">
    <span class="total-lbl">Grand Total</span>
    <span class="total-val" id="totalVal">Rs. 0</span>
    <span class="total-cur npr" id="totalCur">NPR</span>
  </div>
</div>

<div id="toast"></div>
<div id="imgModal" onclick="cI(event)">
  <span class="ci" onclick="cI(event)">&times;</span>
  <img id="fI" src="" onclick="event.stopPropagation()">
</div>

<script>
var API = window.location.pathname.replace('/api/view-orders', '') + '/api';
var RATE = 133;
var cur = 'NPR';

async function loadRateFromDB() {
  try {
    var res = await fetch(API + '/exchange-rate');
    if (!res.ok) { applyRateFallback(133); return; }
    var data = await res.json();
    RATE = data.rate || 133;
    applyRateUI(RATE, data.source, data.fetchedAt);
    updateAmounts();
  } catch (e) { applyRateFallback(133); }
}

function applyRateUI(rate, source, fetchedAt) {
  RATE = rate;
  document.getElementById('rateDisplay').textContent = rate.toFixed(2);
  document.getElementById('rateErr').textContent = '';
  document.getElementById('rateDot').className = 'rc-dot';
  if (source === 'live' && fetchedAt) {
    var d = new Date(fetchedAt);
    document.getElementById('rateTime').textContent = 'Synced: ' + d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }) + ', ' + d.toLocaleDateString('en-GB', { day: '2-digit', month: '2-digit' });
  } else {
    document.getElementById('rateTime').textContent = 'Default';
    document.getElementById('rateDot').classList.add('err');
  }
}

function applyRateFallback(rate) {
  RATE = rate;
  document.getElementById('rateDisplay').textContent = rate.toFixed(2);
  document.getElementById('rateTime').textContent = 'Offline';
  document.getElementById('rateErr').textContent = '';
  document.getElementById('rateDot').className = 'rc-dot err';
  updateAmounts();
}

async function fetchRate() {
  var btn = document.getElementById('rateFetchBtn');
  var errEl = document.getElementById('rateErr');
  btn.textContent = '⏳ Syncing...';
  btn.className = 'rc-btn rc-fetching';
  errEl.textContent = '';
  try {
    var res = await fetch(API + '/exchange-rate/fetch');
    var data = await res.json();
    if (data.success) {
      RATE = data.rate;
      applyRateUI(RATE, 'live', new Date().toISOString());
      updateAmounts();
      sT('✅ Rate synced: 1 USD = ' + RATE.toFixed(2) + ' NPR');
    } else { throw new Error(data.error || 'Unknown error'); }
  } catch (e) {
    errEl.textContent = 'Sync failed: ' + (e.message || 'Network error');
    document.getElementById('rateDot').className = 'rc-dot err';
    sT('❌ Could not sync rate');
  } finally {
    btn.textContent = '🔄 Refresh';
    btn.className = 'rc-btn rc-fetch';
  }
}

function setCur(c) {
  cur = c;
  document.getElementById('tbNPR').classList.toggle('active', c === 'NPR');
  document.getElementById('tbUSD').classList.toggle('active', c === 'USD');
  updateAmounts();
}

function updateAmounts() {
  var total = 0;
  document.querySelectorAll('[data-npr]').forEach(function(el) {
    var npr = parseFloat(el.dataset.npr) || 0;
    total += npr;
    if (cur === 'USD') { el.textContent = '$' + (npr / RATE).toFixed(2); }
    else { el.textContent = 'Rs. ' + npr.toLocaleString('en-NP'); }
  });
  var tv = document.getElementById('totalVal');
  var tc = document.getElementById('totalCur');
  if (cur === 'USD') { tv.textContent = '$' + (total / RATE).toFixed(2); tc.textContent = 'USD'; tc.className = 'total-cur usd'; }
  else { tv.textContent = 'Rs. ' + total.toLocaleString('en-NP'); tc.textContent = 'NPR'; tc.className = 'total-cur npr'; }
}

function sT(m) { var t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(function() { t.classList.remove('show'); }, 3000); }
function oI(s) { if (!s) return; document.getElementById('fI').src = s; document.getElementById('imgModal').classList.add('show'); }
function cI(e) { if (e.target !== document.getElementById('fI')) { document.getElementById('imgModal').classList.remove('show'); } }

function gI() { return [...document.querySelectorAll('.rc:checked')].map(function(c) { return c.value; }); }
function oCC() {
  var i = gI(), t = document.querySelectorAll('.rc').length;
  document.getElementById('bd').disabled = i.length === 0;
  document.getElementById('sc').textContent = i.length > 0 ? i.length + ' selected' : '';
  document.getElementById('ca').checked = i.length === t && t > 0;
}
function tSA() { var c = document.getElementById('ca'); document.querySelectorAll('.rc').forEach(function(x) { x.checked = c.checked; }); oCC(); }

function uI(id, s) {
  var c = document.getElementById('r-' + id)?.querySelector('.badge');
  if (!c) return;
  c.classList.remove('bq', 'bsn', 'bf');
  if (s === 'Sent') { c.classList.add('bsn'); c.textContent = 'Email Sent'; }
  else if (s === 'Failed') { c.classList.add('bf'); c.textContent = 'Email Failed'; }
  else { c.classList.add('bq'); c.textContent = 'Email Queue'; }
  c.style.animation = 'none'; c.offsetHeight; c.style.animation = 'pi .4s ease-out forwards';
}

async function uS(id, ns, el) {
  el.disabled = true; var oc = el.className; el.className = 'ss';
  try {
    var r = await fetch(API + '/update-status', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id: id, status: ns }) });
    var d = await r.json();
    el.className = 'ss s-' + ns;
    uI(id, d.emailStatus || 'Queue');
    if (d.emailStatus === 'Failed') sT('❌ Updated but Email Failed');
    else if (d.emailStatus === 'Sent') sT('✅ Updated & Email Sent');
    else sT('✅ Status updated');
  } catch (e) { sT('❌ Network error'); el.className = oc; }
  finally { el.disabled = false; }
}

async function d1(id, btn) {
  if (!confirm('Delete this order?')) return;
  btn.disabled = true; btn.textContent = '...';
  try {
    var r = await fetch(API + '/delete-order/' + id, { method: 'DELETE });
    var d = await r.json();
    if (d.success) {
      document.getElementById('r-' + id).style.opacity = '0';
      setTimeout(function() { document.getElementById('r-' + id).remove(); oCC(); updateAmounts(); }, 300);
      sT('🗑️ Deleted');
    } else { btn.disabled = false; btn.textContent = 'Del'; }
  } catch (e) { sT('❌ Error'); btn.disabled = false; btn.textContent = 'Del'; }
}

async function dS() {
  var i = gI();
  if (i.length === 0 || !confirm('Delete ' + i.length + ' orders?')) return;
  var btn = document.getElementById('bd'); btn.disabled = true; btn.innerHTML = '⏳...';
  try {
    var r = await fetch(API + '/delete-orders', { method: 'DELETE', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ids: i }) });
    var d = await r.json();
    if (d.success) {
      d.deleted.forEach(function(id) { var el = document.getElementById('r-' + id); if (el) { el.style.opacity = '0'; setTimeout(function() { el.remove(); }, 300); } });
      sT('🗑️ Deleted ' + d.deleted.length);
      setTimeout(function() { oCC(); updateAmounts(); }, 350);
    } else sT('❌ Error');
  } catch (e) { sT('❌ Error'); }
  finally { btn.innerHTML = '🗑️ Delete'; btn.disabled = false; oCC(); }
}
