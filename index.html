// ==================== NEW: WIREFRAME GLOBE ANIMATION ENGINE ====================
(function initGlobeAnimation() {
    const canvas = document.getElementById('globeCanvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    let rotation = 0;

    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function draw() {
        ctx.clearRect(0, 0, width, height);
        const cx = width / 2;
        const cy = height / 2;
        const r = Math.min(width, height) * 0.35; // Radius of globe

        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(rotation * Math.PI / 180);

        // Draw Globe (Circle)
        ctx.beginPath();
        ctx.arc(0, 0, r, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(163, 177, 75, 0.15)'; // Brand color low opacity
        ctx.lineWidth = 1;
        ctx.stroke();

        // Draw Longitude lines
        for (let i = 0; i < 8; i++) {
            ctx.beginPath();
            ctx.ellipse(0, 0, r, r * 0.3, i * (Math.PI / 4), 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(163, 177, 75, 0.1)';
            ctx.stroke();
        }

        // Draw Latitude lines
        for (let i = 0; i < 6; i++) {
            ctx.beginPath();
            ctx.moveTo(-r, -r/2 + (i * r/2.5));
            ctx.lineTo(r, -r/2 + (i * r/2.5));
            ctx.strokeStyle = 'rgba(163, 177, 75, 0.1)';
            ctx.stroke();
        }

        // Draw Satellite Dots
        const satCount = 3;
        for (let i = 0; i < satCount; i++) {
            const angle = (Date.now() / 2000) + (i * (Math.PI * 2 / satCount));
            const sx = Math.cos(angle) * (r + 30);
            const sy = Math.sin(angle) * (r + 30);
            
            ctx.beginPath();
            ctx.arc(sx, sy, 2, 0, Math.PI * 2);
            ctx.fillStyle = '#A3B14B';
            ctx.fill();
            
            // Connection line to center
            ctx.beginPath();
            ctx.moveTo(sx, sy);
            ctx.lineTo(Math.cos(angle) * r, Math.sin(angle) * r);
            ctx.strokeStyle = 'rgba(163, 177, 75, 0.05)';
            ctx.lineWidth = 0.5;
            ctx.stroke();
        }

        ctx.restore();
        rotation += 0.1; // Slow rotation
        requestAnimationFrame(draw);
    }
    draw();
})();

// ==================== NEW: RIPPLE EFFECT ENGINE ====================
function createRipple(event) {
    const button = event.currentTarget;
    const circle = document.createElement("span");
    const diameter = Math.max(button.offsetWidth, button.offsetHeight);
    const radius = diameter / 2;

    circle.style.width = circle.style.height = `${diameter}px`;
    circle.style.left = `${event.clientX - button.offsetLeft - radius}px`;
    circle.style.top = `${event.clientY - button.offsetTop - radius}px`;
    circle.classList.add("ripple");

    const ripple = button.getElementsByClassName("ripple")[0];
    if (ripple) {
        ripple.remove();
    }

    button.appendChild(circle);
}

// Attach Ripple to all .ripple-btn elements
document.querySelectorAll('.ripple-btn').forEach(btn => {
    btn.addEventListener('click', createRipple);
});

function getFilteredProducts() {
  let items = currentCategory === 'all' ? [...products] : products.filter(p => p.category === currentCategory);
  switch (currentSort) {
    case 'name': items.sort((a, b) => a.name.localeCompare(b.name)); break;
    // Since prices are now NPR, we sort directly without multiplier
    case 'price-asc': items.sort((a, b) => a.price - b.price); break;
    case 'price-desc': items.sort((a, b) => b.price - a.price); break;
  }
  return items;
}

function filterCategory(cat) {
  currentCategory = cat;
  document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.cat === cat));
  renderProducts(getFilteredProducts());
}

function sortProducts() {
  currentSort = document.getElementById('sortSelect').value;
  renderProducts(getFilteredProducts());
}

// ==================== CART ====================
function addToCart(id, qty = 1) {
  const p = products.find(x => x.id === id);
  if (!p) return;
  const existing = cart.find(item => item.id === id);
  if (existing) { existing.qty += qty; } else { cart.push({ ...p, qty }); }
  updateCartUI();
  showToast(`${p.name} added to cart`);
}

function removeFromCart(id) { cart = cart.filter(item => item.id !== id); updateCartUI(); }

function updateQty(id, delta) {
  const item = cart.find(i => i.id === id);
  if (!item) return;
  item.qty = Math.max(1, item.qty + delta);
  updateCartUI();
}

function clearCart() { cart = []; updateCartUI(); showToast('Cart cleared', 'info'); }

function updateCartUI() {
  const countEl = document.getElementById('cartCount');
  const totalItems = cart.reduce((s, i) => s + i.qty, 0);
  
  // Totals in NPR (Base)
  const totalPriceNPR = cart.reduce((s, i) => s + i.price * i.qty, 0);
  const totalPriceUSD = totalPriceNPR / USD_TO_NPR;

  if (totalItems > 0) { countEl.classList.remove('hidden'); countEl.classList.add('flex'); countEl.textContent = totalItems; }
  else { countEl.classList.add('hidden'); countEl.classList.remove('flex'); }

  document.getElementById('cartItemCount').textContent = `(${totalItems} item${totalItems !== 1 ? 's' : ''})`;
  document.getElementById('cartTotal').textContent = `NPR ${totalPriceNPR.toLocaleString()} ($${totalPriceUSD.toLocaleString('en-US', { minimumFractionDigits: 2 })})`;

  const cartItemsEl = document.getElementById('cartItems');
  const cartFooter = document.getElementById('cartFooter');

  if (cart.length === 0) {
    cartItemsEl.innerHTML = '<div class="flex flex-col items-center justify-center h-full text-center"><i data-lucide="package-open" class="w-16 h-16 text-txt-third/30 mb-4"></i><p class="text-txt-sub font-medium">Your cart is empty</p><p class="text-sm text-txt-third mt-1">Browse products and add items</p></div>';
    cartFooter.classList.add('hidden');
    lucide.createIcons();
    return;
  }
  cartFooter.classList.remove('hidden');
  cartItemsEl.innerHTML = cart.map(item => {
    const pTotalNPR = item.price * item.qty;
    const pTotalUSD = pTotalNPR / USD_TO_NPR;
    return `
    <div class="flex gap-4 py-4 border-b border-border-main last:border-0">
      <img src="${item.img}" class="w-16 h-16 rounded-xl object-cover flex-shrink-0" onerror="this.style.display='none'">
      <div class="flex-1 min-w-0">
        <div class="flex items-start justify-between gap-2">
          <div>
            <h4 class="text-sm font-medium truncate">${item.name}</h4>
            <p class="text-[11px] text-txt-third italic">${item.sci}</p>
          </div>
          <button onclick="removeFromCart(${item.id})" class="p-1 hover:bg-red-50 rounded-lg transition-colors flex-shrink-0"><i data-lucide="trash-2" class="w-3.5 h-3.5 text-txt-third hover:text-red-500"></i></button>
        </div>
        <p class="text-xs text-txt-third mt-1">NPR ${item.price.toLocaleString()}/kg</p>
        <div class="flex items-center justify-between mt-2">
          <div class="flex items-center border border-border-main rounded-lg overflow-hidden">
            <button onclick="updateQty(${item.id}, -1)" class="px-2.5 py-1 hover:bg-black/5 transition-colors"><i data-lucide="minus" class="w-3 h-3"></i></button>
            <span class="px-3 py-1 text-xs font-medium border-x border-border-main">${item.qty} kg</span>
            <button onclick="updateQty(${item.id}, 1)" class="px-2.5 py-1 hover:bg-black/5 transition-colors"><i data-lucide="plus" class="w-3 h-3"></i></button>

// ==================== FILE UPLOAD LOGIC ====================
function handleFileUpload(event) {
    const file = event.target.files[0];
    const dropZone = document.getElementById('dropZone');
    const errorMsg = document.getElementById('uploadError');
    
    dropZone.classList.remove('upload-error');
    errorMsg.classList.add('hidden');

    if (!file) return;

    if (file.size > 5 * 1024 * 1024) {
        dropZone.classList.add('upload-error');
        errorMsg.textContent = "File too large. Max 5MB allowed.";
        errorMsg.classList.remove('hidden');
        paymentScreenshotBase64 = null;
        resetUploadUI();
        return;
    }

    if (!file.type.match('image.*')) {
        dropZone.classList.add('upload-error');
        errorMsg.textContent = "Invalid file type. Please upload an image.";
        errorMsg.classList.remove('hidden');
        paymentScreenshotBase64 = null;
        resetUploadUI();
        return;
    }

    document.getElementById('uploadPlaceholder').classList.add('hidden');
    document.getElementById('uploadProgressContainer').classList.remove('hidden');
    
    const progressBar = document.getElementById('progressBar');
    progressBar.style.width = '10%';
    
    const reader = new FileReader();
    reader.onload = function(e) {
        paymentScreenshotBase64 = e.target.result;
        progressBar.style.width = '100%';
        
        setTimeout(() => {
            document.getElementById('uploadProgressContainer').classList.add('hidden');
            document.getElementById('imagePreviewContainer').classList.remove('hidden');
            document.getElementById('imagePreview').src = paymentScreenshotBase64;
            document.getElementById('fileName').textContent = file.name;
            lucide.createIcons();
        }, 300);
    };
    reader.readAsDataURL(file);
}

function clearScreenshot(event) {
    if (event) event.stopPropagation();
    paymentScreenshotBase64 = null;
    document.getElementById('paymentScreenshot').value = ""; 
    resetUploadUI();
}

function resetUploadUI() {
    document.getElementById('uploadPlaceholder').classList.remove('hidden');
    document.getElementById('uploadProgressContainer').classList.add('hidden');
    document.getElementById('imagePreviewContainer').classList.add('hidden');
    document.getElementById('dropZone').classList.remove('upload-error');
    document.getElementById('uploadError').classList.add('hidden');
    document.getElementById('progressBar').style.width = '0%';
}

    mainEl.textContent = `$${usd.toLocaleString('en-US', { minimumFractionDigits: 2 })}`;

  }

}

function switchPaymentTab(method) {

}

async function submitOrderToBackend() {
  const btn = document.getElementById('confirmPayBtn');
  const nameInput = document.getElementById('clientName');
  const phoneInput = document.getElementById('clientPhone');
  const emailInput = document.getElementById('clientEmail'); 
  const addressInput = document.getElementById('clientAddress'); 
  const dropZone = document.getElementById('dropZone');
  const uploadError = document.getElementById('uploadError');
  
  let isValid = true;

  if (!nameInput.value.trim()) {
    nameInput.classList.add('input-error');
    isValid = false;
  } else {
    nameInput.classList.remove('input-error');
  }
  
  if (!phoneInput.value.trim()) {
    phoneInput.classList.add('input-error');
    isValid = false;
  } else {
    phoneInput.classList.remove('input-error');
  }

  if (!paymentScreenshotBase64) {
    dropZone.classList.add('upload-error');
    uploadError.classList.remove('hidden');
    isValid = false;
  } else {
    dropZone.classList.remove('upload-error');
    uploadError.classList.add('hidden');
  }

  if (!isValid) {
    showToast('Please fill all required fields and upload proof.', 'error');
    return;
  }

  const originalText = btn.innerHTML;
  const totalNPR = cart.reduce((s, i) => s + i.price * i.qty, 0);
  const totalUSD = totalNPR / USD_TO_NPR;
  
  const finalAmount = selectedPaymentCurrency === 'npr' ? totalNPR : totalUSD;
  const currencySymbol = selectedPaymentCurrency === 'npr' ? 'NPR' : 'USD';

  btn.disabled = true;
  btn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Verifying...`;
  lucide.createIcons();

  const orderData = {
    items: cart,
    totalUSD: totalUSD,
    totalNPR: totalNPR,
    paidAmount: finalAmount,
    currency: currencySymbol,
    paymentMethod: selectedPaymentMethod,
    paymentScreenshot: paymentScreenshotBase64,
    clientDetails: {
      name: nameInput.value.trim(),
      phone: phoneInput.value.trim(),
      email: emailInput.value.trim() || 'N/A',
      address: addressInput.value.trim() || 'N/A'
    },
    timestamp: new Date().toISOString()
  };

  try {
    if(RENDER_BACKEND_URL.includes('your-app-name')) {
      setTimeout(() => {
        showToast('Order placed successfully! We will verify your payment.', 'success');
        cart = [];
        nameInput.value = '';
        phoneInput.value = '';
        emailInput.value = '';
        addressInput.value = '';
        paymentScreenshotBase64 = null;
        resetUploadUI();
        updateCartUI();
        closePaymentModal();
        btn.disabled = false;
        btn.innerHTML = originalText;
      }, 1500);
      return;
    }

    const response = await fetch(`${RENDER_BACKEND_URL}/order`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(orderData)
    });

    if (response.ok) {
      showToast('Order placed successfully! We will verify your payment.', 'success');
      cart = [];
      nameInput.value = '';
      phoneInput.value = '';
      emailInput.value = '';
      addressInput.value = '';
      paymentScreenshotBase64 = null;
      resetUploadUI();
      updateCartUI();
      closePaymentModal();
    } else {
      showToast('Error placing order. Please try again.', 'error');
    }
  } catch (error) {
    console.error('Backend Error:', error);
    showToast('Order saved locally! (Backend unreachable)', 'success');
    cart = [];
    nameInput.value = '';
    phoneInput.value = '';
    emailInput.value = '';
    addressInput.value = '';
    paymentScreenshotBase64 = null;
    resetUploadUI();
    updateCartUI();
    closePaymentModal();
  } finally {
    if(!RENDER_BACKEND_URL.includes('your-app-name')) {
        btn.disabled = false;
        btn.innerHTML = originalText;
    }
  }
}

  const firstName = document.getElementById('inquiryFirstName').value;
  const lastName = document.getElementById('inquiryLastName').value;
  const email = document.getElementById('inquiryEmail').value;
  const company = document.getElementById('inquiryCompany').value;
  const message = document.getElementById('contactMessage').value;

  btn.disabled = true;
  btn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Sending...`;
  msg.classList.add('hidden');

  try {
    // Simulate API call
    await new Promise(resolve => setTimeout(resolve, 1500));

    msg.textContent = '✓ Thank you! Your inquiry has been sent. We\'ll respond within 24 hours.';
    msg.classList.remove('hidden');
    msg.classList.remove('text-red-500');
    msg.classList.add('text-brand');
    e.target.reset();
  } catch (error) {
    console.error(error);
    msg.textContent = '✕ Error sending inquiry. Please try again or email us directly.';
    msg.classList.remove('hidden');
    msg.classList.remove('text-brand');
    msg.classList.add('text-red-500');
  } finally {
    btn.disabled = false;
    btn.innerHTML = originalText;
    lucide.createIcons();
  }
}

renderProducts(products);
lucide.createIcons();
