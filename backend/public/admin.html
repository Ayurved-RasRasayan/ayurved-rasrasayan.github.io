<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NaturaBotanica - Admin Live Chat</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* Prevent pull-to-refresh on mobile which causes "erased" messages */
        html, body { 
            overflow: hidden; 
            height: 100%;
            overscroll-behavior-y: contain; 
        }

        body { background: #f3f4f6; height: 100vh; height: 100dvh; display: flex; flex-direction: column; color: #333; }
        
        /* Header */
        .header { background: #000; color: #fff; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 4px solid #FF5722; flex-shrink: 0; z-index: 10; }
        .header h1 { font-size: 16px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
        .status-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; display: inline-block; margin-right: 6px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); } 70% { box-shadow: 0 0 0 8px rgba(34, 197, 94, 0); } 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); } }
        .header span { font-size: 12px; font-weight: 500; display: flex; align-items: center; }

        /* Main Layout */
        .container { display: flex; flex: 1; overflow: hidden; }

        /* Sidebar - Made Smaller */
        .sidebar { width: 260px; background: #fff; border-right: 2px solid #e5e7eb; display: flex; flex-direction: column; flex-shrink: 0; z-index: 5; }
        .sidebar-header { padding: 15px; border-bottom: 2px solid #e5e7eb; background: #fafafa; }
        .sidebar-header h2 { font-size: 12px; text-transform: uppercase; color: #6b7280; letter-spacing: 1px; font-weight: 700; }
        #sessions { flex: 1; overflow-y: auto; padding: 5px; -webkit-overflow-scrolling: touch; overscroll-behavior-y: contain; }
        
        .session-btn { 
            width: 100%; padding: 10px; margin-bottom: 2px; cursor: pointer; 
            background: #fff; border: 2px solid transparent; border-radius: 6px; 
            text-align: left; transition: all 0.2s; display: flex; align-items: center; gap: 10px;
        }
        .session-btn:hover { background: #f9fafb; border-color: #e5e7eb; }
        .session-btn.active { background: #fff7ed; border-color: #FF5722; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        
        /* Avatar and Badge Wrapper */
        .session-icon-wrapper { position: relative; flex-shrink: 0; }
        .session-icon { 
            width: 36px; height: 36px; background: #f3f4f6; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; font-weight: 700; 
            color: #FF5722; font-size: 12px; 
        }
        
        .unread-badge { 
            position: absolute; top: -4px; right: -6px;
            font-size: 9px; font-weight: 800; background: #FF5722; color: white; 
            padding: 2px 4px; border-radius: 10px; line-height: 1;
            border: 2px solid #fff; box-shadow: 0 1px 2px rgba(0,0,0,0.2);
            display: none; /* Hidden by default until count > 0 */
        }

        .session-info h4 { font-size: 13px; color: #111; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .session-info p { font-size: 11px; color: #6b7280; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 150px; }

        /* Chat Area */
        .chat-area { flex: 1; display: flex; flex-direction: column; background: #f9fafb; min-width: 0; }
        .chat-header { padding: 12px 20px; background: #fff; border-bottom: 2px solid #e5e7eb; flex-shrink: 0; }
        .chat-header h3 { font-size: 14px; color: #111; text-transform: uppercase; letter-spacing: 0.5px; }
        .chat-header p { font-size: 11px; color: #6b7280; margin-top: 2px; }

        #chat-box { 
            flex: 1; padding: 15px; overflow-y: auto; display: flex; 
            flex-direction: column; gap: 12px; background: url('data:image/svg+xml;utf8,<svg width="20" height="20" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><circle cx="2" cy="2" r="1" fill="%23e5e7eb"/></svg>') repeat;
            -webkit-overflow-scrolling: touch; overscroll-behavior-y: contain; min-height: 0; 
        }
        
        .msg-wrapper { display: flex; flex-direction: column; max-width: 85%; }
        .msg-label { font-size: 10px; font-weight: 700; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.5px; padding: 0 4px; }
        .label-client { color: #6b7280; text-align: left; }
        .label-admin { color: #FF5722; text-align: right; }

        .message { padding: 10px 14px; border-radius: 10px; font-size: 13px; line-height: 1.4; position: relative; word-wrap: break-word; }
        
        /* Client Message - Left Aligned */
        .client-msg { background: #fff; border: 1px solid #e5e7eb; color: #111; border-bottom-left-radius: 2px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        /* Admin Message - Right Aligned */
        .admin-msg { background: #fff7ed; border: 1px solid #FF5722; color: #111; border-bottom-right-radius: 2px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        
        .message img { max-width: 100%; border-radius: 8px; margin-top: 6px; display: block; }

        /* Input Area */
        .input-area { padding: 10px 15px; background: #fff; border-top: 2px solid #e5e7eb; display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
        #admin-input { flex: 1; padding: 10px 14px; border: 2px solid #e5e7eb; border-radius: 6px; font-size: 16px; outline: none; transition: border-color 0.2s; min-width: 0; }
        #admin-input:focus { border-color: #FF5722; }
        
        .action-btn { width: 40px; height: 40px; border-radius: 6px; border: 2px solid #e5e7eb; background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; color: #6b7280; flex-shrink: 0; }
        .action-btn:hover { border-color: #FF5722; color: #FF5722; background: #fff7ed; }
        
        .send-btn { padding: 0 15px; height: 40px; background: #FF5722; color: #fff; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; transition: background 0.2s; flex-shrink: 0; font-size: 12px; }
        .send-btn:hover { background: #E64A19; }

        /* Empty State */
        .empty-state { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; color: #9ca3af; padding: 20px; text-align: center; }
        .empty-state svg { width: 50px; height: 50px; margin-bottom: 10px; stroke: #d1d5db; }

        /* Login Screen */
        #login-screen { flex: 1; display: flex; align-items: center; justify-content: center; background: #000; flex-direction: column; gap: 15px; padding: 20px; }
        #login-screen h2 { color: #FF5722; text-transform: uppercase; letter-spacing: 2px; font-size: 18px; margin-bottom: 10px; text-align: center; }
        #login-screen input { padding: 12px 20px; border: 2px solid #333; background: #111; color: white; font-size: 16px; width: 100%; max-width: 300px; outline: none; border-radius: 4px; }
        #login-screen input:focus { border-color: #FF5722; }
        #login-screen button { padding: 12px 30px; background: #FF5722; color: white; border: none; font-weight: 700; cursor: pointer; text-transform: uppercase; border-radius: 4px; margin-top: 10px; transition: background 0.2s; width: 100%; max-width: 300px; }
        #login-screen button:hover { background: #E64A19; }

        /* ================= MOBILE SHRINK ================= */
        @media (max-width: 768px) {
            .header h1 { font-size: 13px; }
            .header span { font-size: 10px; }
            
            /* Very compact sidebar for mobile */
            .sidebar { width: 65px; }
            .sidebar-header { padding: 10px 5px; }
            .sidebar-header h2 { font-size: 8px; text-align: center; }
            
            /* Stack icon and name vertically */
            .session-btn { 
                flex-direction: column; 
                padding: 8px 2px; 
                gap: 4px; 
                align-items: center; 
                text-align: center;
                border-radius: 4px;
            }
            .session-icon { width: 30px; height: 30px; font-size: 10px; }
            .session-info h4 { font-size: 9px; max-width: 55px; margin: 0 auto; }
            .session-info p { display: none; } /* Hide preview on tiny screens */

            .chat-header { padding: 10px 15px; }
            .chat-header h3 { font-size: 12px; }
            .chat-header p { font-size: 10px; }
            
            .message { padding: 8px 12px; font-size: 12px; border-radius: 8px; }
            .msg-label { font-size: 9px; }
            
            .input-area { padding: 8px 10px; gap: 6px; }
            #admin-input { padding: 8px 12px; font-size: 16px; } /* 16px prevents iOS auto-zoom */
            .action-btn { width: 36px; height: 36px; }
            .send-btn { height: 36px; padding: 0 10px; font-size: 10px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>NaturaBotanica</h1>
        <span><span class="status-dot"></span>Live Chat</span>
    </div>

    <!-- SECURITY: Login Screen -->
    <div id="login-screen">
        <h2>Admin Access</h2>
        <input type="text" id="admin-username-input" placeholder="Username">
        <input type="password" id="admin-password-input" placeholder="Password">
        <button onclick="loginAdmin()">Unlock</button>
    </div>

    <!-- Main Dashboard -->
    <div class="container" id="admin-dashboard" style="display: none;">
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>Sessions</h2>
            </div>
            <div id="sessions"></div>
        </div>

        <div class="chat-area">
            <div id="empty-state" class="empty-state">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M20.25 8.511c.884.284 1.5 1.128 1.5 2.097v4.286c0 1.136-.847 2.1-1.98 2.193-.34.027-.68.052-1.02.072v3.091l-3-3c-1.354 0-2.694-.055-4.02-.163a2.115 2.115 0 0 1-.825-.242m9.345-8.334a2.126 2.126 0 0 0-.476-.095 48.64 48.64 0 0 0-8.048 0c-1.131.094-1.976 1.057-1.976 2.192v4.286c0 .837.46 1.58 1.155 1.951m9.345-8.334V6.637c0-1.621-1.152-3.026-2.76-3.235A48.455 48.455 0 0 0 11.25 3c-2.115 0-4.198.137-6.24.402-1.608.209-2.76 1.614-2.76 3.235v6.226c0 1.621 1.152 3.026 2.76 3.235.577.075 1.157.14 1.74.194V21l4.155-4.155" />
                </svg>
                <h3>No Chat Selected</h3>
            </div>

            <div id="chat-container" style="display: none; flex-direction: column; flex: 1;">
                <div class="chat-header">
                    <h3 id="chat-title">User Session</h3>
                    <p id="chat-subtitle">Active now</p>
                </div>
                <div id="chat-box"></div>
                <div class="input-area">
                    <input type="file" id="fileInput" accept="image/*" style="display: none;">
                    <button class="action-btn" onclick="document.getElementById('fileInput').click()" title="Attach Image">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                    </button>
                    <input type="text" id="admin-input" placeholder="Reply...">
                    <button class="send-btn" onclick="sendAdminMsg()">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let socket = null;
        let activeSession = null;
        const chatHistories = {}; 
        const sessionMeta = {}; 
        let unverifiedCounter = 1; 

        function loginAdmin() {
            const username = document.getElementById('admin-username-input').value.trim();
            const password = document.getElementById('admin-password-input').value.trim();
            
            if (!username || !password) return alert("Please enter both Username and Password.");

            socket = io({
              auth: { type: 'admin', username: username, password: password }
            });

            socket.on('connect_error', (err) => {
                alert("Login Failed! Incorrect Username or Password.");
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('admin-dashboard').style.display = 'none';
                socket.disconnect();
            });

            socket.on('connect', () => {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-dashboard').style.display = 'flex';
                initAdminListeners();
            });
        }

        document.getElementById('admin-username-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') { e.preventDefault(); document.getElementById('admin-password-input').focus(); }
        });
        document.getElementById('admin-password-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') { e.preventDefault(); loginAdmin(); }
        });

        function initAdminListeners() {
            socket.on('admin-notification', (data) => {
                let sessionsDiv = document.getElementById('sessions');
                
                if (!chatHistories[data.sessionId]) chatHistories[data.sessionId] = [];
                chatHistories[data.sessionId].push({ type: 'text', sender: 'client', text: data.text });

                if (!sessionMeta[data.sessionId]) {
                    let displayName = "";
                    if (data.isVerified && data.name) {
                        displayName = data.name; 
                    } else {
                        displayName = "User " + unverifiedCounter; 
                        unverifiedCounter++;
                    }
                    sessionMeta[data.sessionId] = { name: displayName, unreads: 0 };
                }

                if (activeSession !== data.sessionId) {
                    sessionMeta[data.sessionId].unreads++;
                }

                if (!document.getElementById('btn-' + data.sessionId)) {
                    let btn = document.createElement('button');
                    btn.id = 'btn-' + data.sessionId;
                    btn.className = 'session-btn';
                    
                    btn.innerHTML = `
                        <div class="session-icon-wrapper">
                            <div class="session-icon">${sessionMeta[data.sessionId].name.substring(0, 2).toUpperCase()}</div>
                            <span id="badge-${data.sessionId}" class="unread-badge"></span>
                        </div>
                        <div class="session-info">
                            <h4 id="name-${data.sessionId}">${sessionMeta[data.sessionId].name}</h4>
                            <p id="preview-${data.sessionId}">${data.text}</p>
                        </div>
                    `;
                    
                    btn.onclick = () => {
                        activeSession = data.sessionId;
                        sessionMeta[data.sessionId].unreads = 0; 
                        updateUnreadBadge(data.sessionId);

                        document.querySelectorAll('.session-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        loadChatHistory(data.sessionId);
                    };
                    sessionsDiv.appendChild(btn);
                    
                    if (!activeSession) btn.click();
                } else {
                    let preview = document.getElementById('preview-' + data.sessionId);
                    if (preview) preview.innerText = data.text;
                }

                updateUnreadBadge(data.sessionId);

                if (activeSession === data.sessionId) {
                    appendMessage('client-msg', data.text, 'client');
                }
            });
        }

        function updateUnreadBadge(sessionId) {
            let badge = document.getElementById('badge-' + sessionId);
            if (badge) {
                let count = sessionMeta[sessionId].unreads;
                if (count > 0) {
                    badge.style.display = 'flex';
                    badge.innerText = count;
                } else {
                    badge.style.display = 'none';
                }
            }
        }

        function loadChatHistory(sessionId) {
            document.getElementById('empty-state').style.display = 'none';
            document.getElementById('chat-container').style.display = 'flex';
            
            document.getElementById('chat-title').innerText = sessionMeta[sessionId].name;
            document.getElementById('chat-subtitle').innerText = 'Live Chat Active';
            
            let chatBox = document.getElementById('chat-box');
            chatBox.innerHTML = ''; 
            
            if (chatHistories[sessionId]) {
                chatHistories[sessionId].forEach(msg => {
                    if (msg.type === 'text') appendMessage(msg.sender === 'client' ? 'client-msg' : 'admin-msg', msg.text, msg.sender);
                    else if (msg.type === 'image') appendImage(msg.sender === 'client' ? 'client-msg' : 'admin-msg', msg.src, msg.sender);
                });
            }
        }

        function appendMessage(cssClass, text, senderType) {
            let chatBox = document.getElementById('chat-box');
            let wrapper = document.createElement('div');
            wrapper.className = 'msg-wrapper';
            
            if (senderType === 'client') {
                wrapper.style.alignSelf = 'flex-start';
            } else {
                wrapper.style.alignSelf = 'flex-end';
            }
            
            let label = document.createElement('div');
            label.className = `msg-label ${senderType === 'client' ? 'label-client' : 'label-admin'}`;
            label.innerText = senderType === 'client' ? sessionMeta[activeSession].name : 'You';
            
            let div = document.createElement('div');
            div.className = `message ${cssClass}`;
            div.innerText = text;
            
            wrapper.appendChild(label);
            wrapper.appendChild(div);
            chatBox.appendChild(wrapper);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function appendImage(cssClass, src, senderType) {
            let chatBox = document.getElementById('chat-box');
            let wrapper = document.createElement('div');
            wrapper.className = 'msg-wrapper';
            
            if (senderType === 'client') {
                wrapper.style.alignSelf = 'flex-start';
            } else {
                wrapper.style.alignSelf = 'flex-end';
            }
            
            let label = document.createElement('div');
            label.className = `msg-label ${senderType === 'client' ? 'label-client' : 'label-admin'}`;
            label.innerText = senderType === 'client' ? sessionMeta[activeSession].name : 'You';
            
            let div = document.createElement('div');
            div.className = `message ${cssClass}`;
            let img = document.createElement('img');
            img.src = src;
            div.appendChild(img);
            
            wrapper.appendChild(label);
            wrapper.appendChild(div);
            chatBox.appendChild(wrapper);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function sendAdminMsg() {
            if (!socket) return;
            let input = document.getElementById('admin-input');
            let text = input.value.trim();
            if (!text || !activeSession) return;

            socket.emit('admin-message', { sessionId: activeSession, text: text });
            chatHistories[activeSession].push({ type: 'text', sender: 'admin', text: text });
            appendMessage('admin-msg', text, 'admin');
            
            let preview = document.getElementById('preview-' + activeSession);
            if (preview) preview.innerText = text;

            input.value = '';
            input.focus(); 
        }

        document.getElementById('admin-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault(); 
                sendAdminMsg();
            }
        });

        document.getElementById('fileInput').addEventListener('change', async function(e) {
            if (!socket) return;
            const file = e.target.files[0];
            if (!file || !activeSession) return;

            if (file.size > 5 * 1024 * 1024) {
                alert("File too large! Please keep it under 5MB.");
                return;
            }

            try {
                const base64 = await compressImage(file);
                socket.emit('admin-image', { sessionId: activeSession, base64: base64 });
                chatHistories[activeSession].push({ type: 'image', sender: 'admin', src: base64 });
                appendImage('admin-msg', base64, 'admin');
                
                let preview = document.getElementById('preview-' + activeSession);
                if (preview) preview.innerText = "📷 Image";
            } catch (err) {
                console.error("Image processing failed:", err);
                alert("Failed to process image.");
            }
            e.target.value = '';
        });

        function compressImage(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 800;
                        let width = img.width;
                        let height = img.height;
                        if (width > MAX_WIDTH) {
                            height = (height * MAX_WIDTH) / width;
                            width = MAX_WIDTH;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7)); 
                    };
                    img.onerror = () => reject(new Error('Image load failed'));
                    img.src = e.target.result;
                };
                reader.onerror = () => reject(new Error('File read failed'));
                reader.readAsDataURL(file);
            });
        }
    </script>
</body>
</html>
