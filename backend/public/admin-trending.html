<script>
    // ==========================================
    // LIVE BACKEND URL
    // ==========================================
    const API = 'https://ayurved-rasrasayan-github-io-1.onrender.com/api';
    let allProducts = [];

    async function init() {
        const username = localStorage.getItem('admin_username');
        const password = localStorage.getItem('admin_password');
        
        if (!username || !password) {
            showError("Not logged in! Please go to the Admin Orders page and log in first.");
            document.getElementById('saveBtn').disabled = true;
            return;
        }
        
        const credentials = btoa(username + ':' + password);

        try {
            // 1. Fetch all products
            const prodRes = await fetch(API + '/products', { headers: { 'Authorization': 'Basic ' + credentials } });
            
            if (!prodRes.ok) {
                throw new Error('Failed to fetch products (Status: ' + prodRes.status + ')');
            }
            
            const prodData = await prodRes.json();
            allProducts = prodData.products || prodData || [];
            
            // Debug: Check the console (F12) to see exactly what data came back
            console.log("Products received from DB:", allProducts);

            if (allProducts.length === 0) {
                document.getElementById('pick1').innerHTML = '<option value="">No products found in DB</option>';
                document.getElementById('pick2').innerHTML = '<option value="">No products found in DB</option>';
                return;
            }

            // FIX: We try to find a valid ID. If _id is missing, we try 'id', then 'name'.
            // This ensures the value is never "undefined".
            const optionsHtml = '<option value="">-- Select a Product --</option>' + allProducts.map(p => {
                const uniqueVal = p._id || p.id || p.name; 
                return `<option value="${uniqueVal}">${p.name} (NPR ${p.price || 0})</option>`;
            }).join('');
            
            document.getElementById('pick1').innerHTML = optionsHtml;
            document.getElementById('pick2').innerHTML = optionsHtml;

            // 2. Fetch Current Picks
            const picksRes = await fetch(API + '/trending');
            if (picksRes.ok) {
                const picksData = await picksRes.json();
                if (picksData.success && picksData.trending) {
                    const currentPicks = picksData.trending.filter(p => p.isPick);
                    // We use the same logic to match the current values
                    if (currentPicks[0]) {
                         const val1 = currentPicks[0]._id || currentPicks[0].id || currentPicks[0].name;
                         document.getElementById('pick1').value = val1;
                    }
                    if (currentPicks[1]) {
                         const val2 = currentPicks[1]._id || currentPicks[1].id || currentPicks[1].name;
                         document.getElementById('pick2').value = val2;
                    }
                }
            }
        } catch (e) {
            showError("Init Error: " + e.message);
        }
    }

    async function savePicks() {
        const pick1 = document.getElementById('pick1').value;
        const pick2 = document.getElementById('pick2').value;
        const btn = document.getElementById('saveBtn');
        
        hideError();

        if (!pick1 || !pick2) {
            showError('Please select exactly 2 products.');
            return;
        }
        if (pick1 === pick2) {
            showError('Please select 2 DIFFERENT products.');
            return;
        }

        const username = localStorage.getItem('admin_username');
        const password = localStorage.getItem('admin_password');
        const credentials = btoa(username + ':' + password);

        btn.disabled = true;
        btn.textContent = 'Saving...';

        try {
            const res = await fetch(API + '/trending/picks', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Basic ' + credentials },
                body: JSON.stringify({ picks: [pick1, pick2] })
            });
            
            const data = await res.json();
            
            if (res.ok && data.success) {
                showToast('✅ Trending picks saved successfully!');
            } else {
                throw new Error(data.error || 'Server returned status ' + res.status);
            }
        } catch (e) {
            showError("Save Failed: " + e.message);
            showToast('❌ Error saving picks', true);
        } finally {
            btn.disabled = false;
            btn.textContent = 'Save Trending Picks';
        }
    }

    function showError(msg) {
        const box = document.getElementById('errorBox');
        box.textContent = msg;
        box.style.display = 'block';
    }

    function hideError() {
        document.getElementById('errorBox').style.display = 'none';
    }

    function showToast(msg, isError) {
        const t = document.getElementById('toast'); 
        t.textContent = msg; 
        t.className = 'toast show' + (isError ? ' toast-error' : '');
        setTimeout(() => t.className = 'toast', 3500);
    }

    init();
</script>
