<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Orders</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, sans-serif; background: #f3f4f6; margin: 0; padding: 0; color: #1f2937; }
  .c { max-width: 1400px; margin: 0 auto; padding: 16px; }

  .hd { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
  h1 { color: #2d4a22; margin: 0; display: flex; align-items: center; gap: 10px; }
  .btn-s { background: #2d4a22; color: #fff; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-weight: 600; font-size: 14px; }

  .tb { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; background: #fff; padding: 12px; border-radius: 8px; box-shadow: 0 1px 2px rgba(0,0,0,.05); }
  .b { padding: 8px 16px; border-radius: 6px; border: none; font-weight: 600; cursor: pointer; font-size: 14px; }
  .bd { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
  .bs { background: #f3f4f6; color: #374151; border: 1px solid #d1d5db; }
  #sc { color: #6b7280; font-size: 14px; }

  .cur-toggle { display: flex; align-items: center; gap: 0; background: #e5e7eb; border-radius: 8px; padding: 3px; overflow: hidden; }
  .cur-btn { padding: 7px 20px; border: none; font-weight: 700; font-size: 13px; cursor: pointer; background: transparent; color: #6b7280; transition: all .25s; border-radius: 6px; }
  .cur-btn.active { background: #2d6a2e; color: #fff; box-shadow: 0 2px 6px rgba(45,106,46,.35); }

  .rc-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; background: #fff; padding: 10px 14px; border-radius: 8px; box-shadow: 0 1px 2px rgba(0,0,0,.05); border: 1px solid #e5e7eb; }
  .rc-label { font-size: 12px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: .5px; }
  .rc-rate { font-size: 15px; font-weight: 800; color: #2d4a22; }
  .rc-time { font-size: 11px; color: #9ca3af; font-weight: 500; margin-left: auto; }
  .rc-btn { padding: 5px 14px; border-radius: 5px; border: none; font-weight: 600; font-size: 12px; cursor: pointer; transition: .2s; }
  .rc-fetch { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
  .rc-fetch:hover { background: #dbeafe; }
  .rc-fetching { background: #f3f4f6; color: #9ca3af; cursor: wait; }
  .rc-err { font-size: 11px; color: #dc2626; font-weight: 500; }

  .tw { background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,.05); }
  table { width: 100%; border-collapse: collapse; table-layout: fixed; min-width: 1200px; }
  th, td { padding: 0; border: 1px solid #e5e7eb; vertical-align: top; text-align: left; }
  th { background: #2d4a22; color: #fff; font-weight: 600; font-size: 12px; text-transform: uppercase; padding: 10px; text-align: center; }

  tr { background: #fff; transition: .2s; }
  tr:hover { background: #fafafa; }

  input[type=checkbox] { width: 18px; height: 18px; cursor: pointer; accent-color: #2d4a22; }

  /* Date/Proof column */
  .cdp { width: 130px; padding: 15px; display: flex; flex-direction: column; justify-content: space-between; align-items: center; background: #f9fafb; }
  .dt { font-weight: 700; color: #2d4a22; font-size: .95rem; }
  .pt { width: 40px; height: 40px; object-fit: cover; border-radius: 4px; border: 1px solid #d1d5db; cursor: pointer; margin-top: 10px; }

  /* Items column — widened to 380px */
  .cp { width: 380px; padding: 15px; }
  .ph { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-bottom: 1px solid #e5e7eb; padding-bottom: 8px; }
  .ph-label { color: #6b7280; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
  .pid { font-size: .8rem; background: #e0e7ff; color: #3730a3; padding: 2px 6px; border-radius: 4px; font-weight: 700; }

  /* Item Row Structure */
  .ir { display: flex; flex-direction: column; margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px dashed #e5e7eb; }

  /* Line 1: Image + Name + Size + Form */
  .iline1 { display: flex; align-items: center; gap: 8px; min-width: 0; margin-bottom: 2px; }
  .it { width: 30px; height: 30px; object-fit: cover; border-radius: 4px; border: 1px solid #d1d5db; flex-shrink: 0; }
  .in { font-weight: 700; color: #1f2937; font-size: .9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .isz { font-weight: 500; color: #4b5563; font-size: .85rem; white-space: nowrap; }

  /* Line 2: Calculation */
  .iline2 { display: flex; align-items: center; justify-content: flex-start; margin-left: 38px; font-size: .8rem; color: #374151; font-weight: 500; }
  .calc-eq { color: #1a5c1c; font-weight: 700; }

  /* Badge styles */
  .fb { display: inline-block; font-size: .65rem; font-weight: 800; text-transform: uppercase; letter-spacing: .3px; padding: 1px 5px; border-radius: 3px; white-space: nowrap; flex-shrink: 0; }
  .fb-powder { background: #dbeafe; color: #1e40af; border: 1px solid #bfdbfe; }
  .fb-whole { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; }

  /* Order Total in items column */
  .ot { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; padding-top: 8px; border-top: 2px dashed #9ca3af; font-size: .9rem; }
  .ot-label { color: #2d4a22; font-size: 14px; font-weight: 900; text-transform: uppercase; letter-spacing: .5px; }
  .ov { color: #1a5c1c; font-weight: 900; font-size: 16px; font-variant-numeric: tabular-nums; }
  .ov-usd { font-size: 11px; font-weight: 600; color: #9ca3af; margin-left: 6px; font-style: normal; }

  /* Status column */
  .cs { width: 150px; padding: 15px; display: flex; flex-direction: column; gap: 10px; justify-content: center; }
  .ss { padding: 8px; border-radius: 6px; border: 1px solid #d1d5db; background: #fff; font-weight: 600; cursor: pointer; width: 100%; font-size: 13px; }
  .s-Pending { background: #fff7ed; color: #c2410c; }
  .s-Shipping { background: #eff6ff; color: #1d4ed8; }
  .s-Completed { background: #f0fdf4; color: #15803d; }
  .s-Success { background: #dcfce7; color: #15803d; }
  .s-Rejected { background: #fef2f2; color: #b91c1c; }

  /* Badges for email status */
  .badge { display: inline-flex; align-items: center; padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: 800; text-transform: uppercase; box-shadow: 0 4px 6px rgba(0,0,0,.1); animation: pi .5s cubic-bezier(.175,.885,.32,1.275) forwards; }
  @keyframes pi { 0% { transform: scale(.8); opacity: 0; } 60% { transform: scale(1.1); } 100% { transform: scale(1); opacity: 1; } }
  .bq { background: linear-gradient(135deg,#fffbeb,#fef3c7); color: #92400e; border: 1px solid #fcd34d; }
  .bsn { background: linear-gradient(135deg,#ecfccb,#d9f99d); color: #365314; border: 1px solid #bef264; }
  .bf { background: linear-gradient(135deg,#fee2e2,#fecaca); color: #991b1b; border: 1px solid #fca5a5; }

  /* Client info */
  .cc { padding: 15px; flex-grow: 1; }
  .cd { font-size: .9rem; color: #374151; margin-bottom: 4px; display: flex; }
  .cd strong { color: #111827; min-width: 70px; display: inline-block; }

  /* Payment badge */
  .py { width: 90px; padding: 15px; display: flex; flex-direction: column; gap: 6px; align-items: center; justify-content: center; }
  .py-badge { display: flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 6px; font-size: .7rem; font-weight: 800; text-transform: uppercase; letter-spacing: .3px; white-space: nowrap; }
  .py-npr { background: #dbeafe; color: #1e40af; border: 1px solid #bfdbfe; }
  .py-usd { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; }
  .py-esewa { background: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }
  .py-khalti { background: #f3e8ff; color: #7c3aed; border: 1px solid #ddd6fe; }

  /* Actions */
  .ca { width: 70px; padding: 15px; display: flex; align-items: center; justify-content: center; }
  .dr { width: 100%; background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; padding: 8px 12px; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 12px; }

  /* Toast and image modal styles omitted for brevity, keep as in your standard code */
  #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px); background: #1f2937; color: #fff; padding: 12px 24px; border-radius: 50px; opacity: 0; transition: .3s; z-index: 2000; font-size: 14px; width: 90%; text-align: center; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #imgModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,.9); z-index: 3000; display: none; align-items: center; justify-content: center; }
  #imgModal.show { display: flex; }
  #imgModal img { max-width: 90%; max-height: 90%; border-radius: 8px; }
  .ci { position: absolute; top: 20px; right: 20px; color: #fff; cursor: pointer; font-size: 40px; }

  /* Responsive styles omitted for brevity, keep as in your original code */
</style>
</head>
<body>
<div class="c">
  <div class="hd">
    <h1>🌿 NaturaBotanica <span style="font-size:.6em;opacity:.5;font-weight:400">Admin</span></h1>
    <a href="/api/manage-stock" class="btn-s">📦 Manage Stock</a>
  </div>
  <div class="tb">
    <button class="b bs" onclick="tSA()">☑️ Select All</button>
    <button class="b bd" id="bd" disabled onclick="dS()">🗑️ Delete</button>
    <span id="sc"></span>
    <div class="cur-toggle">
      <button class="cur-btn active" id="tbNPR" onclick="setCur('NPR')">🇳🇵 NPR</button>
      <button class="cur-btn" id="tbUSD" onclick="setCur('USD')">🇺🇸 USD</button>
    </div>
  </div>
  <div class="rc-bar">
    <span class="rc-dot" id="rateDot"></span>
    <span class="rc-label">💱 Exchange Rate</span>
    <span style="font-size:13px;color:#374151">1 USD =</span>
    <span class="rc-rate" id="rateDisplay">...</span>
    <span style="font-size:13px;color:#374151;font-weight:600">NPR</span>
    <button class="rc-btn rc-fetch" id="rateFetchBtn" onclick="fetchRate()">🔄 Refresh</button>
    <span class="rc-err" id="rateErr"></span>
    <span class="rc-time" id="rateTime"></span>
  </div>
  <div class="tw">
    <table>
      <thead>
        <tr>
          <th width="40"><input type="checkbox" id="ca" onchange="tSA()" /></th>
          <th width="130">Date / Proof</th>
          <th width="380">Order Items</th>
          <th width="150">Status</th>
          <th>Client</th>
          <th width="90">Payment</th>
          <th width="70">Act</th>
        </tr>
      </thead>
      <tbody id="tb">{{ORDERS_ROWS}}</tbody>
    </table>
  </div>
  <div class="total-bar">
    <span class="total-lbl">Grand Total</span>
    <span class="total-val" id="totalVal">Rs. 0</span>
    <span class="total-cur npr" id="totalCur">NPR</span>
  </div>
</div>
<div id="toast">M</div>
<div id="imgModal" onclick="cI(event)">
  <span class="ci" onclick="cI(event)">&times;</span>
  <img id="fI" src="" onclick="event.stopPropagation()" />
</div>

</body>
</html>
