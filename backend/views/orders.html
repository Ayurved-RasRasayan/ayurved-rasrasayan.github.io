<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NaturaBotanica - Orders</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { brand: '#A3B14B' } } }
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; background: #FAFAF9; }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #f1f1f1; } ::-webkit-scrollbar-thumb { background: #a3b14b; border-radius: 3px; }
    .fade-in { animation: fadeIn 0.5s ease-out; } @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .toast { animation: slideIn 0.4s ease-out; } @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .toast-exit { animation: slideOut 0.3s ease-in forwards; } @keyframes slideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0; } }
  </style>
</head>
<body class="text-gray-800 min-h-screen">

  <!-- Navbar -->
  <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 rounded-full bg-brand flex items-center justify-center"><svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg></div>
          <span class="font-semibold text-lg tracking-tight">NaturaBotanica</span>
          <span class="text-xs bg-brand/10 text-brand px-2 py-0.5 rounded-full font-medium">Admin</span>
        </div>
        <div class="flex items-center gap-4">
          <a href="/api/view-orders" class="text-sm text-brand font-semibold border-b-2 border-brand">Orders</a>
          <a href="/api/view-users" class="text-sm text-gray-500 hover:text-gray-800 transition-colors">Users</a>
          <a href="/api/manage-stock" class="text-sm text-gray-500 hover:text-gray-800 transition-colors">Stock</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    
    <!-- Header with Buttons -->
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8 fade-in">
      <div>
        <h1 class="text-2xl font-semibold tracking-tight">Orders Management</h1>
        <p class="text-sm text-gray-500 mt-1" id="orderCountLabel">Loading orders...</p>
      </div>
      <div class="flex items-center gap-3">
        <a href="/api/manage-stock" class="inline-flex items-center gap-2 px-4 py-2.5 bg-brand text-white text-sm font-medium rounded-xl hover:bg-brand-hover transition-colors shadow-sm">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
          Manage Stock
        </a>
        <a href="/api/view-users" class="inline-flex items-center gap-2 px-4 py-2.5 bg-gray-800 text-white text-sm font-medium rounded-xl hover:bg-black transition-colors shadow-sm">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
          Manage Users
        </a>
      </div>
    </div>

    <!-- Bulk Actions Bar (Hidden by default) -->
    <div id="bulkActions" class="hidden bg-gray-50 border border-gray-200 rounded-xl p-4 mb-6 flex items-center justify-between fade-in">
      <span class="text-sm font-medium text-gray-700"><span id="selectedCount">0</span> orders selected</span>
      <button onclick="deleteSelected()" class="inline-flex items-center gap-2 px-4 py-2 bg-red-600 text-white text-sm font-medium rounded-lg hover:bg-red-700 transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
        Delete Selected
      </button>
    </div>

    <!-- Table Container -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden fade-in" style="animation-delay: 0.1s">
      <div class="overflow-x-auto">
        <table class="w-full text-left">
          <thead>
            <tr class="bg-gray-50 border-b border-gray-200">
              <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider w-10">
                <input type="checkbox" id="selectAll" onchange="toggleSelectAll()" class="w-4 h-4 rounded border-gray-300 text-brand focus:ring-brand">
              </th>
              <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Order ID</th>
              <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Client</th>
              <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider hidden md:table-cell">Payment</th>
              <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Status</th>
              <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider hidden lg:table-cell">State</th>
              <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Total</th>
              <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider text-center">Action</th>
            </tr>
          </thead>
          <tbody id="orderTableBody" class="divide-y divide-gray-100">
            <tr><td colspan="8" class="px-6 py-20 text-center text-gray-400"><svg class="w-8 h-8 mx-auto mb-3 animate-spin text-brand" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>Loading orders...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <!-- Toast Container -->
  <div id="toastContainer" class="fixed bottom-6 right-6 z-[60] space-y-3 pointer-events-none"></div>

  <script>
    let allOrders = [];
    let selectedIds = new Set();

    document.addEventListener('DOMContentLoaded', fetchOrders);

    async function fetchOrders() {
      try {
        const res = await fetch('/api/view-orders-data');
        const data = await res.json();
        if (data.success && data.orders) {
          allOrders = data.orders;
          document.getElementById('orderCountLabel').textContent = `${allOrders.length} total orders`;
          renderOrders(allOrders);
        } else {
          throw new Error('Failed to parse');
        }
      } catch (err) {
        document.getElementById('orderTableBody').innerHTML = `<tr><td colspan="8" class="px-6 py-20 text-center text-red-500 font-medium">Error loading orders.</td></tr>`;
      }
    }

    function formatDate(dateString) {
      if (!dateString) return 'N/A';
      return new Date(dateString).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function renderOrders(orders) {
      const tbody = document.getElementById('orderTableBody');
      if (!orders.length) {
        tbody.innerHTML = `<tr><td colspan="8" class="px-6 py-20 text-center text-gray-400">No orders found.</td></tr>`;
        return;
      }

      tbody.innerHTML = orders.map(order => {
        const shortId = order._id.toString().slice(-8).toUpperCase();
        const isSelected = selectedIds.has(order._id.toString());
        
        const statusColors = { 'Pending': 'bg-yellow-50 text-yellow-700 border-yellow-200', 'Success': 'bg-green-50 text-green-700 border-green-200', 'Completed': 'bg-blue-50 text-blue-700 border-blue-200', 'Failed': 'bg-red-50 text-red-700 border-red-200' };
        const statusClass = statusColors[order.status] || 'bg-gray-50 text-gray-700 border-gray-200';
        
        const stateColors = { 'Pending': 'bg-yellow-50 text-yellow-700', 'Processing': 'bg-indigo-50 text-indigo-700', 'Shipped': 'bg-purple-50 text-purple-700', 'Delivered': 'bg-green-50 text-green-700', 'Cancelled': 'bg-red-50 text-red-700' };
        const stateClass = stateColors[order.order_state] || 'bg-gray-50 text-gray-700';

        const itemNames = (order.items || []).map(i => i.name).join(', ') || 'N/A';
        
        return `
          <tr class="hover:bg-gray-50 transition-colors" id="row-${order._id}">
            <td class="px-6 py-4">
              <input type="checkbox" class="order-checkbox w-4 h-4 rounded border-gray-300 text-brand focus:ring-brand" 
                     value="${order._id}" ${isSelected ? 'checked' : ''} onchange="toggleSelect('${order._id}')">
            </td>
            <td class="px-6 py-4">
              <div class="font-mono text-sm font-semibold text-brand">#${shortId}</div>
              <div class="text-[10px] text-gray-400">${formatDate(order.timestamp)}</div>
            </td>
            <td class="px-6 py-4">
              <div class="font-medium text-sm">${order.clientDetails?.name || 'Unknown'}</div>
              <div class="text-xs text-gray-500">${order.clientDetails?.email || ''}</div>
              <div class="text-xs text-gray-400">${order.clientDetails?.phone || ''}</div>
            </td>
            <td class="px-6 py-4 hidden md:table-cell">
              <span class="text-xs bg-gray-100 px-2 py-1 rounded font-medium">${order.paymentMethod || 'N/A'}</span>
              ${order.paymentScreenshot ? `<a href="${order.paymentScreenshot}" target="_blank" class="block text-[10px] text-brand mt-1 hover:underline">View Screenshot</a>` : ''}
            </td>
            <td class="px-6 py-4">
              <select onchange="updateStatus('${order._id}', this.value)" class="text-xs font-medium px-2 py-1.5 rounded-lg border ${statusClass} focus:outline-none focus:ring-1 focus:ring-brand">
                ${['Pending', 'Processing', 'Success', 'Completed', 'Failed'].map(s => `<option value="${s}" ${order.status === s ? 'selected' : ''}>${s}</option>`).join('')}
              </select>
            </td>
            <td class="px-6 py-4 hidden lg:table-cell">
              <select onchange="updateOrderState('${order._id}', this.value)" class="text-xs font-medium px-2 py-1.5 rounded-lg border border-gray-200 ${stateClass} focus:outline-none focus:ring-1 focus:ring-brand">
                ${['Pending', 'Processing', 'Shipped', 'Delivered', 'Cancelled'].map(s => `<option value="${s}" ${order.order_state === s ? 'selected' : ''}>${s}</option>`).join('')}
              </select>
            </td>
            <td class="px-6 py-4 font-semibold text-sm">NPR ${(order.totalNPR || 0).toLocaleString()}</td>
            <td class="px-6 py-4 text-center">
              <button onclick="deleteSingleOrder('${order._id}')" class="text-gray-400 hover:text-red-600 transition-colors p-1.5 rounded-lg hover:bg-red-50">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
              </button>
            </td>
          </tr>
        `;
      }).join('');
      updateBulkUI();
    }

    // ─── SELECTION LOGIC ──────────────────────────────────────────
    function toggleSelect(id) {
      if (selectedIds.has(id)) selectedIds.delete(id); else selectedIds.add(id);
      updateBulkUI();
    }

    function toggleSelectAll() {
      const checkboxes = document.querySelectorAll('.order-checkbox');
      const selectAllChecked = document.getElementById('selectAll').checked;
      selectedIds.clear();
      if (selectAllChecked) checkboxes.forEach(cb => selectedIds.add(cb.value));
      renderOrders(allOrders); // Re-render to update checkbox states visually
    }

    function updateBulkUI() {
      const bulkBar = document.getElementById('bulkActions');
      if (selectedIds.size > 0) {
        bulkBar.classList.remove('hidden');
        document.getElementById('selectedCount').textContent = selectedIds.size;
      } else {
        bulkBar.classList.add('hidden');
      }
    }

    // ─── STATUS & STATE UPDATES ──────────────────────────────────
    async function updateStatus(id, status) {
      try {
        const res = await fetch('/api/update-status', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id, status }) });
        const data = await res.json();
        if (data.success) showToast(`Status updated to ${status}`);
        else throw new Error(data.error);
      } catch (e) { showToast('Failed to update status', 'error'); fetchOrders(); }
    }

    async function updateOrderState(id, state) {
      try {
        const res = await fetch('/api/update-order-state', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id, state }) });
        const data = await res.json();
        if (data.success) showToast(`State updated to ${state}`);
        else throw new Error(data.error);
      } catch (e) { showToast('Failed to update state', 'error'); fetchOrders(); }
    }

    // ─── DELETE LOGIC ──────────────────────────────────────────
    async function deleteSingleOrder(id) {
      if (!confirm('Are you sure you want to delete this order?')) return;
      try {
        const res = await fetch(`/api/delete-order/${id}`, { method: 'DELETE' });
        const data = await res.json();
        if (data.success) {
          removeRow(id);
          allOrders = allOrders.filter(o => o._id !== id);
          document.getElementById('orderCountLabel').textContent = `${allOrders.length} total orders`;
          showToast('Order deleted');
        } else throw new Error();
      } catch (e) { showToast('Failed to delete order', 'error'); }
    }

    async function deleteSelected() {
      if (!confirm(`Delete ${selectedIds.size} selected orders?`)) return;
      try {
        const res = await fetch('/api/delete-orders', { method: 'DELETE', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ids: Array.from(selectedIds) }) });
        const data = await res.json();
        if (data.success) {
          Array.from(selectedIds).forEach(id => { removeRow(id); allOrders = allOrders.filter(o => o._id !== id); });
          selectedIds.clear();
          document.getElementById('selectAll').checked = false;
          document.getElementById('orderCountLabel').textContent = `${allOrders.length} total orders`;
          updateBulkUI();
          showToast('Orders deleted');
        } else throw new Error();
      } catch (e) { showToast('Failed to delete orders', 'error'); }
    }

    function removeRow(id) {
      const row = document.getElementById(`row-${id}`);
      if (row) { row.style.transition = 'all 0.3s ease'; row.style.opacity = '0'; row.style.transform = 'translateX(20px)'; setTimeout(() => row.remove(), 300); }
    }

    // ─── TOAST NOTIFICATIONS ──────────────────────────────────────────
    function showToast(msg, type = 'success') {
      const container = document.getElementById('toastContainer');
      const el = document.createElement('div');
      el.className = 'toast bg-white rounded-xl shadow-lg p-4 mb-2 text-sm pointer-events-auto border-l-4 ' + (type === 'success' ? 'border-green-500' : 'border-red-500');
      el.innerHTML = msg;
      container.appendChild(el);
      setTimeout(() => { el.classList.add('toast-exit'); setTimeout(() => el.remove(), 300); }, 2500);
    }
  </script>
</body>
</html>
