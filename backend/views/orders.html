<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Your Cart - NaturaBotanica</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f0;
            color: #2c3e2f;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: #2d4a22;
            color: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header h1 {
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header h1 span {
            font-size: 1.8rem;
        }

        .continue-shopping {
            background: rgba(255,255,255,0.2);
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 8px;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .continue-shopping:hover {
            background: rgba(255,255,255,0.3);
        }

        /* Main Layout */
        .cart-layout {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 24px;
        }

        @media (max-width: 768px) {
            .cart-layout {
                grid-template-columns: 1fr;
            }
        }

        /* Cart Items */
        .cart-items {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .cart-header {
            display: grid;
            grid-template-columns: 3fr 1fr 1fr 0.5fr;
            background: #f8f9fa;
            padding: 15px 20px;
            font-weight: 600;
            color: #2d4a22;
            border-bottom: 2px solid #e5e7eb;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        @media (max-width: 600px) {
            .cart-header {
                display: none;
            }
        }

        .cart-item {
            display: grid;
            grid-template-columns: 3fr 1fr 1fr 0.5fr;
            padding: 20px;
            border-bottom: 1px solid #e5e7eb;
            align-items: center;
            transition: background 0.2s;
        }

        .cart-item:hover {
            background: #fefce8;
        }

        @media (max-width: 600px) {
            .cart-item {
                display: flex;
                flex-direction: column;
                gap: 12px;
                position: relative;
                padding: 20px 15px;
            }
        }

        .product-info {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .product-image {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
            background: #f3f4f6;
        }

        .product-details h3 {
            font-size: 1rem;
            margin-bottom: 4px;
            color: #1f2937;
        }

        .product-sku {
            font-size: 0.75rem;
            color: #9ca3af;
            font-family: monospace;
        }

        .product-price {
            font-weight: 600;
            color: #2d4a22;
        }

        @media (max-width: 600px) {
            .product-info {
                width: 100%;
            }
            .product-price, .quantity-control, .remove-btn {
                display: flex;
                justify-content: space-between;
                align-items: center;
                width: 100%;
            }
            .product-price::before {
                content: "Price:";
                font-weight: 600;
                color: #6b7280;
            }
            .quantity-control::before {
                content: "Quantity:";
                font-weight: 600;
                color: #6b7280;
            }
        }

        /* Quantity Controls */
        .quantity-control {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .qty-btn {
            width: 32px;
            height: 32px;
            border: 1px solid #d1d5db;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .qty-btn:hover {
            background: #2d4a22;
            color: white;
            border-color: #2d4a22;
        }

        .qty-value {
            min-width: 40px;
            text-align: center;
            font-weight: 600;
        }

        /* Remove Button */
        .remove-btn {
            background: none;
            border: none;
            color: #dc2626;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 8px;
            border-radius: 8px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .remove-btn:hover {
            background: #fee2e2;
        }

        /* Cart Summary */
        .cart-summary {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            position: sticky;
            top: 20px;
            height: fit-content;
        }

        .summary-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e5e7eb;
            color: #2d4a22;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            font-size: 1rem;
        }

        .summary-row.total {
            border-top: 2px solid #e5e7eb;
            margin-top: 10px;
            padding-top: 20px;
            font-weight: 800;
            font-size: 1.3rem;
            color: #2d4a22;
        }

        /* Payment Methods */
        .payment-methods {
            margin: 20px 0;
        }

        .payment-title {
            font-weight: 600;
            margin-bottom: 12px;
            color: #374151;
        }

        .payment-options {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .payment-option {
            flex: 1;
            min-width: 100px;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
        }

        .payment-option.selected {
            border-color: #2d4a22;
            background: #f0fdf4;
        }

        .payment-option:hover {
            border-color: #2d4a22;
        }

        .payment-option img {
            width: 50px;
            height: auto;
            margin-bottom: 5px;
        }

        .payment-option span {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
        }

        /* Buttons */
        .btn-primary {
            width: 100%;
            background: #2d4a22;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-primary:hover {
            background: #1f3618;
            transform: translateY(-2px);
        }

        .btn-secondary {
            width: 100%;
            background: #f3f4f6;
            color: #374151;
            border: 1px solid #d1d5db;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }

        .btn-secondary:hover {
            background: #e5e7eb;
        }

        /* Empty Cart */
        .empty-cart {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 16px;
        }

        .empty-cart svg {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-cart h2 {
            color: #6b7280;
            margin-bottom: 10px;
        }

        .empty-cart p {
            color: #9ca3af;
            margin-bottom: 20px;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1f2937;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            transition: 0.3s;
            z-index: 1000;
            font-size: 14px;
            pointer-events: none;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            text-align: center;
        }

        .modal-content input, .modal-content textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        /* Loading */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>
            <span>🌿</span> NaturaBotanica
        </h1>
        <a href="/products" class="continue-shopping">
            ← Continue Shopping
        </a>
    </div>

    <div class="cart-layout">
        <!-- Cart Items Section -->
        <div class="cart-items" id="cartItemsContainer">
            <!-- Cart items will be rendered here -->
        </div>

        <!-- Cart Summary Section -->
        <div class="cart-summary">
            <div class="summary-title">Order Summary</div>
            <div class="summary-row">
                <span>Subtotal</span>
                <span id="subtotalAmount">NPR 0</span>
            </div>
            <div class="summary-row">
                <span>Shipping</span>
                <span>Free</span>
            </div>
            <div class="summary-row total">
                <span>Total</span>
                <span id="totalAmount">NPR 0</span>
            </div>

            <div class="payment-methods">
                <div class="payment-title">Select Payment Method</div>
                <div class="payment-options">
                    <div class="payment-option" data-method="esewa">
                        <span>🏦 eSewa</span>
                    </div>
                    <div class="payment-option" data-method="khalti">
                        <span>💳 Khalti</span>
                    </div>
                    <div class="payment-option" data-method="bank">
                        <span>🏧 Bank Transfer</span>
                    </div>
                </div>
            </div>

            <button class="btn-primary" id="checkoutBtn" onclick="proceedToCheckout()">
                💰 Proceed to Payment
            </button>
            <button class="btn-secondary" onclick="clearCart()">
                🗑️ Clear Cart
            </button>
        </div>
    </div>
</div>

<!-- Inquiry Modal -->
<div class="modal" id="inquiryModal">
    <div class="modal-content">
        <h3>📋 Submit Inquiry</h3>
        <p style="color: #6b7280; margin-bottom: 15px;">Our team will contact you shortly</p>
        <input type="text" id="inquiryName" placeholder="Full Name" required>
        <input type="email" id="inquiryEmail" placeholder="Email Address" required>
        <input type="tel" id="inquiryPhone" placeholder="Phone Number">
        <textarea id="inquiryMessage" rows="3" placeholder="Additional notes or questions..."></textarea>
        <div class="modal-buttons">
            <button class="btn-secondary" onclick="closeInquiryModal()">Cancel</button>
            <button class="btn-primary" onclick="submitInquiry()">Submit Inquiry</button>
        </div>
    </div>
</div>

<div class="toast" id="toast">Notification</div>

<script>
    // Cart Management
    let cart = [];

    // Load cart from localStorage
    function loadCart() {
        const saved = localStorage.getItem('naturaCart');
        if (saved) {
            try {
                cart = JSON.parse(saved);
            } catch(e) { cart = []; }
        }
        renderCart();
    }

    // Save cart to localStorage
    function saveCart() {
        localStorage.setItem('naturaCart', JSON.stringify(cart));
    }

    // Add to cart (for product page integration)
    window.addToCart = function(product) {
        const existing = cart.find(item => item.id === product.id);
        if (existing) {
            existing.quantity++;
        } else {
            cart.push({
                id: product.id,
                name: product.name,
                price: product.price,
                image: product.image || '',
                sku: product.sku || product.id,
                quantity: 1
            });
        }
        saveCart();
        renderCart();
        showToast(`${product.name} added to cart`);
    };

    // Update quantity
    function updateQuantity(id, delta) {
        const item = cart.find(i => i.id === id);
        if (item) {
            const newQty = item.quantity + delta;
            if (newQty <= 0) {
                removeItem(id);
            } else {
                item.quantity = newQty;
                saveCart();
                renderCart();
            }
        }
    }

    // Remove item
    function removeItem(id) {
        cart = cart.filter(i => i.id !== id);
        saveCart();
        renderCart();
        showToast('Item removed from cart');
    }

    // Clear entire cart
    window.clearCart = function() {
        if (cart.length === 0) return;
        if (confirm('Are you sure you want to clear your cart?')) {
            cart = [];
            saveCart();
            renderCart();
            showToast('Cart cleared');
        }
    };

    // Get selected payment method
    function getSelectedPayment() {
        const selected = document.querySelector('.payment-option.selected');
        return selected ? selected.dataset.method : 'esewa';
    }

    // Calculate totals
    function calculateTotal() {
        const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        return { subtotal, total: subtotal };
    }

    // Proceed to checkout / Inquiry
    window.proceedToCheckout = function() {
        if (cart.length === 0) {
            showToast('Your cart is empty');
            return;
        }
        
        const paymentMethod = getSelectedPayment();
        
        if (paymentMethod === 'bank') {
            // Show inquiry modal for bank transfer
            openInquiryModal();
        } else {
            // Process eSewa/Khalti payment
            processPayment(paymentMethod);
        }
    };

    // Process eSewa/Khalti payment
    async function processPayment(method) {
        const { total } = calculateTotal();
        
        showToast(`Processing ${method.toUpperCase()} payment...`);
        
        // Prepare order data
        const orderData = {
            items: cart.map(item => ({
                id: item.id,
                name: item.name,
                price: item.price,
                qty: item.quantity
            })),
            totalUSD: (total / 133).toFixed(2),
            totalNPR: total,
            paidAmount: total,
            currency: 'NPR',
            paymentMethod: method,
            clientDetails: {
                name: 'Guest Customer',
                phone: '',
                email: '',
                address: ''
            }
        };
        
        try {
            // In production, this would call your backend API
            // For demo, we'll simulate order creation
            const response = await fetch('/api/orders', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(orderData)
            });
            
            const data = await response.json();
            
            if (data.success) {
                showToast(`Order placed successfully! Order ID: ${data.orderId}`);
                cart = [];
                saveCart();
                renderCart();
                
                // Redirect to payment gateway or show success
                setTimeout(() => {
                    window.location.href = '/order-success?orderId=' + data.orderId;
                }, 2000);
            } else {
                showToast('Order failed. Please try again.');
            }
        } catch (error) {
            console.error('Payment error:', error);
            showToast('Payment processing failed. Please try again.');
        }
    }

    // Open inquiry modal
    function openInquiryModal() {
        document.getElementById('inquiryModal').classList.add('show');
    }

    window.closeInquiryModal = function() {
        document.getElementById('inquiryModal').classList.remove('show');
    };

    // Submit inquiry
    window.submitInquiry = async function() {
        const name = document.getElementById('inquiryName').value;
        const email = document.getElementById('inquiryEmail').value;
        const phone = document.getElementById('inquiryPhone').value;
        const message = document.getElementById('inquiryMessage').value;
        
        if (!name || !email) {
            showToast('Please fill in your name and email');
            return;
        }
        
        const { total } = calculateTotal();
        
        const inquiryData = {
            firstName: name.split(' ')[0],
            lastName: name.split(' ').slice(1).join(' ') || '',
            email: email,
            phone: phone,
            company: 'Cart Inquiry',
            message: `Cart Items: ${cart.length} products\nTotal: NPR ${total}\n\nAdditional Notes: ${message}`
        };
        
        try {
            const response = await fetch('/api/inquiries', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(inquiryData)
            });
            
            const data = await response.json();
            
            if (data.success) {
                showToast('Inquiry submitted! We will contact you soon.');
                closeInquiryModal();
                // Clear form
                document.getElementById('inquiryName').value = '';
                document.getElementById('inquiryEmail').value = '';
                document.getElementById('inquiryPhone').value = '';
                document.getElementById('inquiryMessage').value = '';
            } else {
                showToast('Failed to submit inquiry. Please try again.');
            }
        } catch (error) {
            showToast('Network error. Please try again.');
        }
    };

    // Render cart items
    function renderCart() {
        const container = document.getElementById('cartItemsContainer');
        const { subtotal, total } = calculateTotal();
        
        document.getElementById('subtotalAmount').innerHTML = `NPR ${subtotal.toLocaleString('en-NP')}`;
        document.getElementById('totalAmount').innerHTML = `NPR ${total.toLocaleString('en-NP')}`;
        
        if (cart.length === 0) {
            container.innerHTML = `
                <div class="empty-cart">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-1.5 6M17 13l1.5 6M9 21h6M12 15v6"/>
                    </svg>
                    <h2>Your cart is empty</h2>
                    <p>Add some products to get started</p>
                    <a href="/products" class="btn-primary" style="display: inline-block; text-decoration: none; padding: 12px 30px;">Browse Products</a>
                </div>
            `;
            return;
        }
        
        container.innerHTML = `
            <div class="cart-header">
                <span>Product</span>
                <span>Price</span>
                <span>Quantity</span>
                <span>Action</span>
            </div>
            ${cart.map(item => `
                <div class="cart-item" data-id="${item.id}">
                    <div class="product-info">
                        <div class="product-details">
                            <h3>${escapeHtml(item.name)}</h3>
                            <div class="product-sku">#${item.sku}</div>
                        </div>
                    </div>
                    <div class="product-price">
                        NPR ${(item.price * item.quantity).toLocaleString('en-NP')}
                        <small style="display: block; color: #9ca3af; font-size: 0.7rem;">NPR ${item.price.toLocaleString('en-NP')} each</small>
                    </div>
                    <div class="quantity-control">
                        <button class="qty-btn" onclick="updateQuantity('${item.id}', -1)">-</button>
                        <span class="qty-value">${item.quantity}</span>
                        <button class="qty-btn" onclick="updateQuantity('${item.id}', 1)">+</button>
                    </div>
                    <button class="remove-btn" onclick="removeItem('${item.id}')">
                        ✕ Remove
                    </button>
                </div>
            `).join('')}
        `;
    }
    
    // Helper functions
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }
    
    // Payment method selection
    document.querySelectorAll('.payment-option').forEach(option => {
        option.addEventListener('click', function() {
            document.querySelectorAll('.payment-option').forEach(o => o.classList.remove('selected'));
            this.classList.add('selected');
        });
    });
    
    // Make first payment option selected by default
    if (document.querySelector('.payment-option')) {
        document.querySelector('.payment-option').classList.add('selected');
    }
    
    // Load cart on page load
    loadCart();
    
    // Exchange rate for USD conversion (if needed)
    async function loadExchangeRate() {
        try {
            const res = await fetch('/api/public/rate');
            const data = await res.json();
            if (data.rate) {
                window.exchangeRate = data.rate;
            }
        } catch(e) {}
    }
    loadExchangeRate();
    
    // Close modal when clicking outside
    document.getElementById('inquiryModal').addEventListener('click', function(e) {
        if (e.target === this) closeInquiryModal();
    });
</script>
</body>
</html>
