<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NaturaBotanica - Users</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { brand: '#A3B14B' } } }
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; background: #FAFAF9; }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #f1f1f1; } ::-webkit-scrollbar-thumb { background: #a3b14b; border-radius: 3px; }
    .fade-in { animation: fadeIn 0.5s ease-out; } @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="text-gray-800 min-h-screen">

  <!-- Navbar -->
  <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 rounded-full bg-brand flex items-center justify-center"><svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg></div>
          <span class="font-semibold text-lg tracking-tight">NaturaBotanica</span>
          <span class="text-xs bg-brand/10 text-brand px-2 py-0.5 rounded-full font-medium">Admin</span>
        </div>
        <div class="flex items-center gap-4">
          <a href="/api/view-orders" class="text-sm text-gray-500 hover:text-gray-800 transition-colors">Orders</a>
          <a href="/api/view-users" class="text-sm text-brand font-semibold border-b-2 border-brand">Users</a>
          <a href="/api/manage-stock" class="text-sm text-gray-500 hover:text-gray-800 transition-colors">Stock</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    
    <!-- Header -->
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8 fade-in">
      <div>
        <h1 class="text-2xl font-semibold tracking-tight">Registered Users</h1>
        <p class="text-sm text-gray-500 mt-1" id="userCountLabel">Loading users...</p>
      </div>
      <div class="relative w-full sm:w-64">
        <input type="text" id="searchInput" placeholder="Search by name or email..." class="w-full pl-10 pr-4 py-2.5 bg-white border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent shadow-sm">
        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
      </div>
    </div>

    <!-- Table Container -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden fade-in" style="animation-delay: 0.1s">
      <div class="overflow-x-auto">
        <table class="w-full text-left">
          <thead>
            <tr class="bg-gray-50 border-b border-gray-200">
              <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">User</th>
              <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Status</th>
              <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider hidden md:table-cell">Phone</th>
              <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider hidden lg:table-cell">Cart Items</th>
              <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Joined</th>
              <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider text-center">Actions</th>
            </tr>
          </thead>
          <tbody id="userTableBody" class="divide-y divide-gray-100">
            <tr><td colspan="6" class="px-6 py-20 text-center text-gray-400"><svg class="w-8 h-8 mx-auto mb-3 animate-spin text-brand" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>Loading users...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <!-- Toast notification -->
  <div id="toast" style="position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);background:#1f2937;color:white;padding:12px 24px;border-radius:50px;transition:0.3s;z-index:1000;font-size:14px;max-width:90vw;text-align:center;font-family:Inter,sans-serif;"></div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const tbody = document.getElementById('userTableBody');
      const countLabel = document.getElementById('userCountLabel');
      const searchInput = document.getElementById('searchInput');
      let allUsers = [];

      // ═══════════════════════════════════════════════════════════
      // ============ AUTHENTICATION (FIXED) ======================
      // ═══════════════════════════════════════════════════════════
      function getAuth() {
        let username = localStorage.getItem('admin_username');
        let password = localStorage.getItem('admin_password');

        if (!username || !password) {
          username = prompt('Enter admin username:');
          password = prompt('Enter admin password:');
          if (username && password) {
            localStorage.setItem('admin_username', username);
            localStorage.setItem('admin_password', password);
          } else {
            return null;
          }
        }
        return { credentials: btoa(username + ':' + password) };
      }

      function clearAuth() {
        localStorage.removeItem('admin_username');
        localStorage.removeItem('admin_password');
      }

      // Helper: safely parse response (handles both JSON and plain text)
      async function safeParse(response) {
        const text = await response.text();
        try {
          return JSON.parse(text);
        } catch {
          return { success: false, error: text || `HTTP ${response.status}` };
        }
      }

      function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.style.transform = 'translateX(-50%) translateY(0)';
        setTimeout(() => { toast.style.transform = 'translateX(-50%) translateY(100px)'; }, 3000);
      }

      // ═══════════════════════════════════════════════════════════
      // ============ FETCH USERS (WITH AUTH) =====================
      // ═══════════════════════════════════════════════════════════
      async function fetchUsers() {
        try {
          const auth = getAuth();
          if (!auth) throw new Error('Authentication required');

          const res = await fetch('/api/view-users-data', {
            headers: { 'Authorization': 'Basic ' + auth.credentials }
          });

          if (res.status === 401) {
            clearAuth();
            throw new Error('Login failed. Please reload and try again.');
          }

          const data = await res.json();
          
          if (data.success && data.users) {
            allUsers = data.users;
            countLabel.textContent = `${allUsers.length} total users`;
            renderUsers(allUsers);
          } else {
            throw new Error('Failed to parse users');
          }
        } catch (err) {
          console.error(err);
          tbody.innerHTML = `<tr><td colspan="6" class="px-6 py-20 text-center text-red-500 font-medium">❌ ${err.message}<br><button onclick="location.reload()" style="margin-top:10px;padding:8px 16px;background:#A3B14B;color:white;border:none;border-radius:8px;cursor:pointer;font-weight:600;">Retry</button></td></tr>`;
        }
      }

      function formatDate(dateString) {
        if (!dateString) return 'N/A';
        return new Date(dateString).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
      }

      function renderUsers(usersToRender) {
        if (!usersToRender.length) {
          tbody.innerHTML = `<tr><td colspan="6" class="px-6 py-20 text-center text-gray-400">No users found.</td></tr>`;
          return;
        }

        tbody.innerHTML = usersToRender.map(user => {
          const isVerified = user.isVerified;
          const statusBadge = isVerified 
            ? `<span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-medium bg-green-50 text-green-700"><span class="w-1.5 h-1.5 rounded-full bg-green-500"></span>Verified</span>`
            : `<span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-medium bg-yellow-50 text-yellow-700"><span class="w-1.5 h-1.5 rounded-full bg-yellow-500"></span>Unverified</span>`;
            
          const cartCount = user.cart ? user.cart.length : 0;

          return `
            <tr class="hover:bg-gray-50 transition-colors" id="row-${user._id}">
              <td class="px-6 py-4">
                <div class="flex items-center gap-3">
                  <div class="w-9 h-9 rounded-full bg-brand/10 flex items-center justify-center text-brand font-semibold text-sm">${user.name ? user.name.charAt(0).toUpperCase() : '?'}</div>
                  <div>
                    <div class="font-medium text-sm text-gray-900">${user.name || 'Unknown'}</div>
                    <div class="text-xs text-gray-500">${user.email || 'No email'}</div>
                  </div>
                </div>
              </td>
              <td class="px-6 py-4">${statusBadge}</td>
              <td class="px-6 py-4 text-sm text-gray-600 hidden md:table-cell">${user.phone || 'N/A'}</td>
              <td class="px-6 py-4 text-sm text-gray-600 hidden lg:table-cell">
                <span class="bg-gray-100 px-2 py-0.5 rounded text-xs font-medium">${cartCount} items</span>
              </td>
              <td class="px-6 py-4 text-sm text-gray-500">${formatDate(user.timestamp)}</td>
              <td class="px-6 py-4 text-center">
                <button onclick="deleteUser('${user._id}', '${(user.name || 'this user').replace(/'/g, "\\'")}')" class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-red-50 text-red-600 text-xs font-medium rounded-lg hover:bg-red-100 hover:text-red-700 transition-colors">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                  Delete
                </button>
              </td>
            </tr>
          `;
        }).join('');
      }

      // ═══════════════════════════════════════════════════════════
      // ============ DELETE USER (FIXED - WITH AUTH) =============
      // ═══════════════════════════════════════════════════════════
      window.deleteUser = async (userId, userName) => {
        if (!confirm(`Are you sure you want to delete ${userName}? This action cannot be undone.`)) return;

        const auth = getAuth();
        if (!auth) {
          showToast('❌ Authentication required');
          return;
        }

        try {
          const res = await fetch(`/api/delete-user/${userId}`, {
            method: 'DELETE',
            headers: { 'Authorization': 'Basic ' + auth.credentials }
          });

          if (res.status === 401) {
            clearAuth();
            showToast('❌ Session expired. Please reload the page.');
            return;
          }

          const data = await safeParse(res);

          if (data.success) {
            const row = document.getElementById(`row-${userId}`);
            if (row) {
              row.style.transition = 'all 0.3s ease';
              row.style.opacity = '0';
              row.style.transform = 'translateX(20px)';
              setTimeout(() => row.remove(), 300);
            }

            allUsers = allUsers.filter(u => u._id !== userId);
            countLabel.textContent = `${allUsers.length} total users`;
            showToast('✅ User deleted');
          } else {
            showToast('❌ Failed to delete: ' + (data.error || 'Unknown error'));
          }
        } catch (err) {
          console.error(err);
          showToast('❌ Error connecting to server.');
        }
      }

      // Search functionality
      searchInput.addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase();
        const filtered = allUsers.filter(user => 
          (user.name && user.name.toLowerCase().includes(query)) || 
          (user.email && user.email.toLowerCase().includes(query))
        );
        renderUsers(filtered);
      });

      fetchUsers();
    });
  </script>
</body>
</html>
